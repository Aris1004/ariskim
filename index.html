<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS KIM | 아리스김</title>
<meta property="og:type" content="website">
<meta property="og:title" content="ARIS KIM | 아리스김">
<meta property="og:description" content="뉴욕 카네기홀 · 예술의전당 최초 1호 아티스트 · 아시아 탱고 챔피언">
<meta property="og:image" content="https://ariskim.netlify.app/og_sign.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A84C;--bg:#0A0908;--text:#F2EDE4;--gold-subtle:rgba(201,168,76,0.3);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;}
a,a:link,a:visited{color:var(--text);text-decoration:none;-webkit-tap-highlight-color:transparent;}
a:hover,a:active{color:var(--text);}

/* ═══════════════════════════════════════
   GOLDEN SPARK FULL-SCREEN INTRO
   ═══════════════════════════════════════ */
.golden-spark-overlay{
  position:fixed;inset:0;z-index:99999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  pointer-events:auto;overflow:hidden;
}
.golden-spark-overlay.fade{animation:sparkOverlayFade 1.4s ease forwards;}
.golden-spark-overlay.done{display:none;}

/* ── Seed: tiny golden point ── */
.spark-seed{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:#fff;
  box-shadow:0 0 6px #C9A84C,0 0 15px rgba(201,168,76,0.6);
  opacity:0;
  animation:seedPulse 0.6s ease 0.2s forwards;
}
@keyframes seedPulse{
  0%{opacity:0;transform:scale(0);}
  60%{opacity:1;transform:scale(1.2);}
  100%{opacity:1;transform:scale(0.8);}
}

/* ── Smoke clouds: brilliant golden fog ── */
.smoke{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(232,204,122,0.95) 0%,rgba(201,168,76,0.7) 30%,rgba(180,140,50,0.35) 60%,transparent 80%);
  filter:blur(25px);opacity:0;
  mix-blend-mode:screen;
}
.smoke-1{width:80px;height:80px;animation:smokeA 2.4s ease-out 0.5s forwards;}
.smoke-2{width:120px;height:100px;animation:smokeB 2.8s ease-out 0.6s forwards;}
.smoke-3{width:100px;height:120px;animation:smokeC 2.6s ease-out 0.55s forwards;}
.smoke-4{width:90px;height:90px;animation:smokeD 3s ease-out 0.65s forwards;}
.smoke-5{width:140px;height:80px;animation:smokeE 2.5s ease-out 0.45s forwards;}
.smoke-6{width:70px;height:110px;animation:smokeF 2.7s ease-out 0.7s forwards;}
.smoke-7{width:100px;height:70px;animation:smokeG 2.9s ease-out 0.5s forwards;}
.smoke-8{width:60px;height:90px;animation:smokeH 2.3s ease-out 0.6s forwards;}

@keyframes smokeA{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:1;}
  35%{opacity:0.9;transform:translate(-12vw,-10vh) scale(2.5);filter:blur(35px);}
  65%{opacity:0.5;transform:translate(-25vw,-20vh) scale(4);filter:blur(55px);}
  100%{opacity:0;transform:translate(-35vw,-28vh) scale(5.5);filter:blur(80px);}
}
@keyframes smokeB{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:1;}
  35%{opacity:0.85;transform:translate(14vw,-12vh) scale(2.8);filter:blur(35px);}
  65%{opacity:0.45;transform:translate(25vw,-25vh) scale(4.5);filter:blur(55px);}
  100%{opacity:0;transform:translate(35vw,-32vh) scale(6);filter:blur(80px);}
}
@keyframes smokeC{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:1;}
  35%{opacity:0.9;transform:translate(-10vw,14vh) scale(2.5);filter:blur(35px);}
  65%{opacity:0.5;transform:translate(-20vw,28vh) scale(4);filter:blur(55px);}
  100%{opacity:0;transform:translate(-28vw,38vh) scale(5.5);filter:blur(80px);}
}
@keyframes smokeD{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:0.95;}
  35%{opacity:0.85;transform:translate(16vw,12vh) scale(2.6);filter:blur(35px);}
  65%{opacity:0.45;transform:translate(30vw,22vh) scale(4.2);filter:blur(55px);}
  100%{opacity:0;transform:translate(38vw,30vh) scale(5.5);filter:blur(80px);}
}
@keyframes smokeE{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:1;}
  35%{opacity:0.85;transform:translate(-20vw,3vh) scale(3);filter:blur(35px);}
  65%{opacity:0.4;transform:translate(-35vw,6vh) scale(5);filter:blur(60px);}
  100%{opacity:0;transform:translate(-45vw,8vh) scale(6.5);filter:blur(85px);}
}
@keyframes smokeF{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:0.95;}
  35%{opacity:0.85;transform:translate(6vw,-20vh) scale(2.5);filter:blur(35px);}
  65%{opacity:0.45;transform:translate(10vw,-35vh) scale(4);filter:blur(55px);}
  100%{opacity:0;transform:translate(14vw,-45vh) scale(5.5);filter:blur(80px);}
}
@keyframes smokeG{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:0.95;}
  35%{opacity:0.8;transform:translate(20vw,-5vh) scale(2.8);filter:blur(35px);}
  65%{opacity:0.4;transform:translate(35vw,-8vh) scale(4.5);filter:blur(55px);}
  100%{opacity:0;transform:translate(42vw,-10vh) scale(6);filter:blur(80px);}
}
@keyframes smokeH{
  0%{opacity:0;transform:translate(0,0) scale(0.5);}
  12%{opacity:1;}
  35%{opacity:0.85;transform:translate(-5vw,20vh) scale(2.5);filter:blur(35px);}
  65%{opacity:0.45;transform:translate(-8vw,35vh) scale(4);filter:blur(55px);}
  100%{opacity:0;transform:translate(-10vw,42vh) scale(5.5);filter:blur(80px);}
}

/* ── Golden glow flash at center ── */
.spark-glow{
  position:absolute;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,245,200,1) 0%,rgba(232,204,122,0.85) 25%,rgba(201,168,76,0.5) 50%,transparent 75%);
  filter:blur(5px);opacity:0;
  animation:glowBurst 2.2s ease-out 0.35s forwards;
}
@keyframes glowBurst{
  0%{opacity:0;transform:scale(0);}
  8%{opacity:1;transform:scale(3);filter:blur(8px);}
  20%{opacity:1;transform:scale(8);filter:blur(15px);}
  40%{opacity:0.85;transform:scale(18);filter:blur(30px);}
  65%{opacity:0.4;transform:scale(30);filter:blur(50px);}
  100%{opacity:0;transform:scale(45);filter:blur(70px);}
}

/* ── Ember sparks: tiny bright dots flying outward ── */
.ember{
  position:absolute;border-radius:50%;
  background:#E8CC7A;
  box-shadow:0 0 4px #C9A84C,0 0 8px rgba(201,168,76,0.5);
  opacity:0;
}
.em1{width:2px;height:2px;animation:emA 1.8s cubic-bezier(0.2,0.8,0.3,1) 0.45s forwards;}
.em2{width:3px;height:3px;animation:emB 2s cubic-bezier(0.2,0.8,0.3,1) 0.5s forwards;}
.em3{width:2px;height:2px;animation:emC 1.6s cubic-bezier(0.2,0.8,0.3,1) 0.55s forwards;}
.em4{width:2px;height:2px;animation:emD 2.2s cubic-bezier(0.2,0.8,0.3,1) 0.48s forwards;}
.em5{width:3px;height:3px;animation:emE 1.9s cubic-bezier(0.2,0.8,0.3,1) 0.52s forwards;}
.em6{width:2px;height:2px;animation:emF 2.1s cubic-bezier(0.2,0.8,0.3,1) 0.58s forwards;}
.em7{width:2px;height:2px;animation:emG 1.7s cubic-bezier(0.2,0.8,0.3,1) 0.42s forwards;}
.em8{width:3px;height:3px;animation:emH 2.3s cubic-bezier(0.2,0.8,0.3,1) 0.6s forwards;}
.em9{width:2px;height:2px;animation:emI 1.8s cubic-bezier(0.2,0.8,0.3,1) 0.47s forwards;}
.em10{width:2px;height:2px;animation:emJ 2s cubic-bezier(0.2,0.8,0.3,1) 0.53s forwards;}
.em11{width:3px;height:3px;animation:emK 1.6s cubic-bezier(0.2,0.8,0.3,1) 0.56s forwards;}
.em12{width:2px;height:2px;animation:emL 2.4s cubic-bezier(0.2,0.8,0.3,1) 0.44s forwards;}

@keyframes emA{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-38vw,-28vh);}}
@keyframes emB{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(32vw,-35vh);}}
@keyframes emC{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-28vw,32vh);}}
@keyframes emD{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(40vw,22vh);}}
@keyframes emE{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-18vw,-42vh);}}
@keyframes emF{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(22vw,38vh);}}
@keyframes emG{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-45vw,8vh);}}
@keyframes emH{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(12vw,-45vh);}}
@keyframes emI{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-10vw,45vh);}}
@keyframes emJ{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(45vw,-10vh);}}
@keyframes emK{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(-35vw,-15vh);}}
@keyframes emL{0%{opacity:0;transform:translate(0,0);}15%{opacity:1;}100%{opacity:0;transform:translate(8vw,42vh);}}

@keyframes sparkOverlayFade{
  0%{opacity:1;}
  100%{opacity:0;pointer-events:none;}
}

/* ═══════════════════════════════════════
   PHASE 1: THE VOID
   ═══════════════════════════════════════ */
#phase1{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
#phase1.fade-out{opacity:0;pointer-events:none;}

#phase1-container{
  position:relative;
  width:90vw;max-width:900px;height:300px;
  text-align:center;
}

#sig-kr-top{
  position:absolute;top:calc(50% - 60px);left:50%;
  transform:translateX(-50%);white-space:nowrap;
  font-family:'Noto Serif KR',serif;font-size:clamp(11px,1.4vw,15px);
  font-weight:200;letter-spacing:0.35em;
  color:rgba(201,168,76,0.7);
  opacity:0;
  animation:revealName 1.2s ease 0.8s forwards;
}
#sig-line{
  position:absolute;top:calc(50% - 10px);left:50%;
  transform:translateX(-50%);
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:expandLine 1.5s ease 1.2s forwards;
}
#sig-en{
  position:absolute;top:calc(50% + 20px);left:50%;
  transform:translateX(-50%) scale(0.92);white-space:nowrap;
  font-family:'Cinzel',serif;font-size:clamp(28px,5vw,72px);
  font-weight:900;letter-spacing:0.12em;
  color:var(--text);
  text-shadow:0 0 40px rgba(201,168,76,0.3);
  opacity:0;
  animation:revealName 1.4s ease 1.6s forwards;
}
#sig-kr-bottom{
  position:absolute;top:calc(50% + 100px);left:50%;
  transform:translateX(-50%);white-space:nowrap;
  font-family:'Noto Serif KR',serif;font-size:clamp(10px,1.2vw,14px);
  font-weight:200;letter-spacing:0.6em;
  color:rgba(201,168,76,0.4);
  opacity:0;
  animation:revealName 1s ease 2.2s forwards;
}
#spark{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:radial-gradient(circle,var(--gold),rgba(201,168,76,0.4));
  top:50%;left:50%;transform:translate(-50%,-50%);
  opacity:0;
  animation:sparkPulse 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
  box-shadow:0 0 12px var(--gold),inset 0 0 4px rgba(242,237,228,0.5);
}

@keyframes revealName{
  0%{opacity:0;transform:translateX(-50%) translateY(8px);}
  100%{opacity:1;transform:translateX(-50%) translateY(0);}
}
@keyframes expandLine{
  0%{width:0;}
  100%{width:min(300px,60vw);}
}
@keyframes sparkPulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}
  50%{opacity:1;}
  100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}
}

/* ═══════════════════════════════════════
   PHASE 2: THE REVELATION
   ═══════════════════════════════════════ */
#phase2{
  position:fixed;inset:0;z-index:200;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase2.show{opacity:1;}
#phase2.fade-out{opacity:0;transition:opacity 1s ease;}

#void-left,#void-right{
  position:absolute;top:0;width:50%;height:100%;
  background:var(--bg);z-index:2;
  transition:transform 1.8s cubic-bezier(0.77,0,0.18,1);
}
#void-left{left:0;}
#void-right{right:0;}
#phase2.show #void-left{transform:translateX(-100%);}
#phase2.show #void-right{transform:translateX(100%);}

#hero-image{
  position:absolute;inset:0;
  background:url('images/screw_photo.jpg') center/cover no-repeat;
  filter:brightness(0.6);
  animation:kenBurns 12s ease-in-out infinite alternate;
}
@keyframes kenBurns{
  0%{transform:scale(1);}
  100%{transform:scale(1.08);}
}

#hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.4) 0%,rgba(10,9,8,0.1) 40%,rgba(10,9,8,0.6) 100%);
  z-index:1;
}

#phase2-content{
  position:absolute;bottom:12%;left:0;right:0;
  text-align:center;z-index:3;
  opacity:0;
  animation:fadeUp 1.2s ease 2s forwards;
}
#p2-tag{
  font-family:'Cinzel',serif;font-size:clamp(7px,0.9vw,10px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
#p2-kr-top{
  font-family:'Noto Serif KR',serif;font-size:clamp(10px,1.2vw,14px);
  font-weight:200;letter-spacing:0.25em;
  color:rgba(242,237,228,0.7);
}

@keyframes fadeUp{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* ═══════════════════════════════════════
   PHASE 3: THE PORTAL — Gold Frame Cards
   ═══════════════════════════════════════ */
#phase3{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(20px,3vw,60px);
  padding:clamp(20px,4vh,60px) clamp(20px,4vw,80px);
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase3.show{opacity:1;pointer-events:auto;}

/* Golden floating particles */
.golden-dust{
  position:fixed;border-radius:50%;pointer-events:none;z-index:101;
  background:radial-gradient(circle,rgba(201,168,76,0.6),transparent);
  opacity:0;
}
#phase3.show ~ .golden-dust{opacity:1;}
.dust-1{width:3px;height:3px;top:18%;left:12%;animation:floatDust 8s ease-in-out infinite;}
.dust-2{width:2px;height:2px;top:72%;left:8%;animation:floatDust 11s ease-in-out 1s infinite;}
.dust-3{width:4px;height:4px;top:35%;right:15%;animation:floatDust 9s ease-in-out 2s infinite;}
.dust-4{width:2px;height:2px;top:60%;right:10%;animation:floatDust 10s ease-in-out 0.5s infinite;}
.dust-5{width:3px;height:3px;top:85%;left:45%;animation:floatDust 12s ease-in-out 3s infinite;}
.dust-6{width:2px;height:2px;top:15%;right:40%;animation:floatDust 7s ease-in-out 1.5s infinite;}

@keyframes floatDust{
  0%,100%{transform:translateY(0) translateX(0);opacity:0.3;}
  25%{transform:translateY(-20px) translateX(10px);opacity:0.7;}
  50%{transform:translateY(-8px) translateX(-8px);opacity:0.5;}
  75%{transform:translateY(-25px) translateX(5px);opacity:0.8;}
}

/* Card — gold framed photo card */
.card{
  position:relative;flex:1;max-width:520px;
  height:clamp(400px,75vh,800px);
  border:1.5px solid rgba(201,168,76,0.55);
  overflow:hidden;cursor:pointer;
  text-decoration:none;display:block;
  transition:transform 0.6s ease,box-shadow 0.6s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(201,168,76,0.15),0 0 80px rgba(201,168,76,0.08);
}

.card-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:brightness(0.65);
  transition:filter 0.7s,transform 0.7s;
}
.card:hover .card-img{filter:brightness(0.8);transform:scale(1.03);}
#card-story .card-img{background-image:url('images/hero_led_stage.jpg');}
#card-booking .card-img{background-image:url('images/hero_a5_klimt_led.jpg');}

.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.2) 0%,rgba(10,9,8,0.05) 30%,rgba(10,9,8,0.55) 100%);
  z-index:1;
}

.card-content{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
}

.card-discover{
  font-family:'Cinzel',serif;font-size:clamp(8px,1vw,11px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
.card-title{
  font-family:'Cinzel',serif;font-size:clamp(28px,4vw,56px);
  font-weight:900;letter-spacing:0.1em;
  color:var(--text);margin-bottom:12px;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.card-kr{
  font-family:'Noto Serif KR',serif;font-size:clamp(11px,1.2vw,15px);
  font-weight:200;letter-spacing:0.3em;
  color:rgba(242,237,228,0.5);margin-bottom:28px;
}
.card-cta{
  display:inline-block;font-family:'Cinzel',serif;
  font-size:clamp(10px,1vw,13px);font-weight:400;
  letter-spacing:0.3em;padding:14px 36px;
  border:1px solid rgba(242,237,228,0.3);
  color:rgba(242,237,228,0.8);
  transition:all 0.35s;
}
.card-cta:hover{
  background:rgba(201,168,76,0.15);
  border-color:var(--gold);color:var(--text);
}

/* Golden corner accents inside card */
.card::before,.card::after{
  content:'';position:absolute;width:20px;height:20px;
  z-index:3;opacity:0.4;transition:opacity 0.4s;
}
.card:hover::before,.card:hover::after{opacity:0.8;}
.card::before{bottom:16px;left:16px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.card::after{bottom:16px;right:16px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

/* Signature */
#sig{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
  z-index:999;font-family:'Cinzel',serif;font-size:7px;
  letter-spacing:0.5em;color:rgba(201,168,76,0.12);
  white-space:nowrap;pointer-events:none;
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */

/* Tablet */
@media(min-width:769px) and (max-width:1024px){
  .card{max-width:420px;}
  .card-title{font-size:clamp(24px,3.5vw,40px);}
}

/* Small tablet / large phone landscape */
@media(min-width:481px) and (max-width:768px){
  #phase3{flex-direction:row;gap:16px;padding:20px;}
  .card{max-width:none;height:clamp(350px,70vh,600px);}
  .card-title{font-size:clamp(20px,3vw,32px);}
  .card-kr{font-size:10px;}
  .card-discover{font-size:8px;}
  .card-cta{padding:10px 24px;font-size:9px;}
}

/* Phone */
@media(max-width:480px){
  html,body{overflow-y:auto!important;overflow-x:hidden!important;}
  #phase3{
    position:relative!important;
    flex-direction:column;gap:16px;
    padding:16px;min-height:100vh;
    align-items:stretch;
  }
  .card{flex:none;max-width:none;height:clamp(300px,45vh,500px);}
  .card-title{font-size:clamp(24px,7vw,36px);}
  .card-kr{font-size:11px;}
  .card-cta{padding:12px 28px;font-size:10px;}

// Golden spark overlay removal — wait for smoke to dissipate
var sparkEl = document.getElementById('sparkOverlay');
if(sparkEl){
  setTimeout(function(){ sparkEl.classList.add('fade'); }, 2600);
  setTimeout(function(){ sparkEl.classList.add('done'); }, 4000);
}

// Check for skip parameter
var params = new URLSearchParams(window.location.search);
var skipToEnd = params.get('skip') === '1';

if(skipToEnd){
  // Skip to Phase 3 immediately
  if(sparkEl) sparkEl.classList.add('done');
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'none';
  document.getElementById('phase3').classList.add('show');
} else {
  // Full theatrical sequence

  // Phase 1 fade-out at 9s (문구 충분히 보여준 후)
  setTimeout(function(){
    document.getElementById('phase1').classList.add('fade-out');
  }, 9000);

  // Phase 2 show at 9.5s (사진 등장)
  setTimeout(function(){
    document.getElementById('phase2').classList.add('show');
  }, 9500);

  // Phase 2 fade-out at 14s (사진 4.5초간 유지)
  setTimeout(function(){
    document.getElementById('phase2').classList.add('fade-out');
  }, 14000);

  // Phase 3 show at 14.5s
  setTimeout(function(){
    document.getElementById('phase3').classList.add('show');
  }, 14500);
}

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowLeft') window.location.href = 'story.html';
  if(e.key === 'ArrowRight') window.location.href = 'booking.html';
});
</script>
