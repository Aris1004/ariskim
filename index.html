<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIS KIM | 아리스김</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="ARIS KIM | 아리스김">
  <meta property="og:description" content="뉴욕 카네기홀 · 예술의전당 최초 1호 아티스트 · 아시아 탱고 챔피언">
  <meta property="og:image" content="https://ariskim.netlify.app/og_sign.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #C9A84C;
      --bg: #0A0908;
      --text: #F2EDE4;
      --gold-subtle: rgba(201, 168, 76, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
    }

    a, a:link, a:visited {
      color: var(--text);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    a:hover, a:active {
      color: var(--text);
    }

    /* ════════════════════════════════════════════════════════════
       PHASE 1: THE VOID (0-2.5s)
       ════════════════════════════════════════════════════════════ */
    #phase1 {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2.3s;
      pointer-events: auto;
    }

    #phase1.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #phase1-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 90vw;
      max-width: 900px;
      height: 300px;
    }

    /* Tiny golden spark pulse at center */
    #spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold), rgba(201, 168, 76, 0.4));
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      animation: sparkPulse 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
      box-shadow: 0 0 12px var(--gold), inset 0 0 4px rgba(242, 237, 228, 0.5);
    }

    @keyframes sparkPulse {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* Horizontal line with elegant expansion */
    #sig-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transform: translate(-50%, -50%);
      animation: expandLine 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
      z-index: 5;
    }

    @keyframes expandLine {
      0% {
        width: 0;
        opacity: 0;
      }
      30% {
        opacity: 1;
      }
      100% {
        width: 200px;
        opacity: 1;
      }
    }

    /* Korean text above line — letter by letter reveal */
    #sig-kr-top {
      position: absolute;
      top: calc(50% - 60px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(14px, 2.2vw, 24px);
      font-weight: 200;
      letter-spacing: 0.2em;
      color: var(--text);
      opacity: 0;
      white-space: nowrap;
      text-align: center;
      animation: revealText 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.8s forwards;
    }

    @keyframes revealText {
      0% {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
      }
      100% {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }
    }

    /* English name below line — scale and fade */
    #sig-en {
      position: absolute;
      top: calc(50% + 20px);
      left: 50%;
      transform: translateX(-50%) scale(0.92);
      font-family: 'Cinzel', serif;
      font-size: clamp(56px, 13vw, 140px);
      font-weight: 700;
      letter-spacing: 0.32em;
      color: var(--text);
      opacity: 0;
      white-space: nowrap;
      animation: revealName 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.4s forwards;
    }

    @keyframes revealName {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.92);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    /* Korean name hint below — very subtle */
    #sig-kr-bottom {
      position: absolute;
      top: calc(50% + 100px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(12px, 1.8vw, 20px);
      font-weight: 200;
      letter-spacing: 0.8em;
      color: rgba(201, 168, 76, 0.3);
      opacity: 0;
      white-space: nowrap;
      animation: fadeIn 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.9s forwards;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    /* ════════════════════════════════════════════════════════════
       PHASE 2: THE REVELATION (2.5-5s)
       ════════════════════════════════════════════════════════════ */
    #phase2 {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      pointer-events: none;
      background: var(--bg);
    }

    #phase2.show {
      opacity: 1;
    }

    #phase2.fade-out {
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* The void tears open — black void splits */
    #void-left, #void-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: var(--bg);
      z-index: 100;
    }

    #void-left {
      left: 0;
      animation: slideOutLeft 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s forwards;
    }

    #void-right {
      right: 0;
      animation: slideOutRight 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s forwards;
    }

    @keyframes slideOutLeft {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    @keyframes slideOutRight {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(100%);
      }
    }

    /* Hero image with Ken Burns zoom and overlay */
    #hero-image {
      position: absolute;
      inset: 0;
      background-image: url('images/screw_photo.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: kenBurnsZoom 8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
      z-index: 1;
    }

    @keyframes kenBurnsZoom {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.05);
      }
    }

    /* Semi-transparent vignette overlay */
    #hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(10, 9, 8, 0) 0%,
        rgba(10, 9, 8, 0.3) 50%,
        rgba(10, 9, 8, 0.6) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* Text overlay on hero */
    #phase2-content {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 50;
      max-width: 90%;
    }

    #p2-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.8s forwards;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #p2-kr-top {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(12px, 1.8vw, 18px);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(242, 237, 228, 0.7);
      line-height: 1.6;
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2.2s forwards;
    }

    /* ════════════════════════════════════════════════════════════
       PHASE 3: THE CHOICE (5s+) - KLIMT-INSPIRED FRAMES
       ════════════════════════════════════════════════════════════ */
    #phase3 {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 5vw, 60px);
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      pointer-events: none;
      flex-wrap: wrap;
      gap: clamp(30px, 8vw, 80px);
    }

    #phase3.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Golden frames container */
    .frame-wrapper {
      position: relative;
      flex: 1;
      min-width: 280px;
      max-width: 420px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
    }

    .frame-wrapper:nth-child(1) {
      animation: frameAppear 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 5.5s forwards;
    }

    .frame-wrapper:nth-child(3) {
      animation: frameAppear 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 5.8s forwards;
    }

    @keyframes frameAppear {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Ornate frame border — CSS-created Klimt-inspired frame */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
      border: 3px solid var(--gold);
      box-shadow: inset 0 0 0 8px var(--bg), inset 0 0 0 11px var(--gold),
                  0 0 40px rgba(201, 168, 76, 0.15);
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Frame corner decorations */
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--gold);
      opacity: 0.6;
      transition: opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 5;
    }

    .frame::before {
      top: -8px;
      left: -8px;
      border-right: none;
      border-bottom: none;
    }

    .frame::after {
      bottom: -8px;
      right: -8px;
      border-left: none;
      border-top: none;
    }

    .frame-wrapper:hover .frame::before,
    .frame-wrapper:hover .frame::after {
      opacity: 1;
    }

    /* Inner frame image container */
    .frame-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.6) saturate(0.9);
      transition: filter 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 1;
    }

    .frame-wrapper:hover .frame-image {
      filter: brightness(0.85) saturate(1.1);
    }

    #frame-left .frame-image {
      background-image: url('images/perf_smoke.jpg');
    }

    #frame-right .frame-image {
      background-image: url('images/hero_a5_klimt_led.jpg');
    }

    /* Frame content overlay */
    .frame-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      text-align: center;
      padding: clamp(20px, 6vw, 40px);
      background: linear-gradient(
        180deg,
        rgba(10, 9, 8, 0) 0%,
        rgba(10, 9, 8, 0.3) 60%,
        rgba(10, 9, 8, 0.8) 100%
      );
      opacity: 0.95;
    }

    .frame-tag {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.6em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 20px;
      opacity: 0.7;
      transition: opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .frame-wrapper:hover .frame-tag {
      opacity: 1;
    }

    .frame-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--text);
    }

    #frame-left .frame-title {
      color: rgba(242, 237, 228, 0.95);
    }

    #frame-right .frame-title {
      color: var(--gold);
    }

    .frame-kr {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(13px, 1.6vw, 18px);
      font-weight: 200;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    #frame-left .frame-kr {
      color: rgba(242, 237, 228, 0.7);
    }

    #frame-right .frame-kr {
      color: rgba(201, 168, 76, 0.75);
    }

    .frame-cta {
      display: inline-block;
      font-family: 'Noto Serif KR', serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 14px 36px;
      border: 1px solid;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      opacity: 0.9;
    }

    #frame-left .frame-cta {
      border-color: rgba(242, 237, 228, 0.5);
      color: rgba(242, 237, 228, 0.8);
    }

    #frame-left .frame-cta:hover {
      background: rgba(242, 237, 228, 0.15);
      border-color: rgba(242, 237, 228, 0.9);
      color: white;
    }

    #frame-right .frame-cta {
      border-color: var(--gold);
      color: var(--gold);
    }

    #frame-right .frame-cta:hover {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    /* Frame lift on hover */
    .frame-wrapper:hover .frame {
      transform: translateY(-8px);
      box-shadow: inset 0 0 0 8px var(--bg), inset 0 0 0 11px var(--gold),
                  0 20px 60px rgba(201, 168, 76, 0.25);
    }

    /* Diamond divider between frames */
    #frame-divider {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: var(--gold);
      opacity: 0;
      animation: fadeIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 6.2s forwards;
      z-index: 50;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }

    /* Golden particle floaters */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 99;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold), rgba(201, 168, 76, 0.2));
      opacity: 0.4;
    }

    .particle-1 {
      width: 6px;
      height: 6px;
      top: 20%;
      left: 15%;
      animation: float 8s ease-in-out infinite;
    }

    .particle-2 {
      width: 4px;
      height: 4px;
      top: 30%;
      right: 20%;
      animation: float 10s ease-in-out 1s infinite;
    }

    .particle-3 {
      width: 5px;
      height: 5px;
      bottom: 25%;
      left: 22%;
      animation: float 9s ease-in-out 0.5s infinite;
    }

    .particle-4 {
      width: 3px;
      height: 3px;
      top: 40%;
      right: 10%;
      animation: float 11s ease-in-out 2s infinite;
    }

    .particle-5 {
      width: 4px;
      height: 4px;
      bottom: 30%;
      right: 15%;
      animation: float 7.5s ease-in-out 1.5s infinite;
    }

    .particle-6 {
      width: 5px;
      height: 5px;
      top: 60%;
      left: 10%;
      animation: float 9.5s ease-in-out 2.5s infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) translateX(0px);
        opacity: 0.3;
      }
      25% {
        transform: translateY(-30px) translateX(20px);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-60px) translateX(-10px);
        opacity: 0.4;
      }
      75% {
        transform: translateY(-30px) translateX(-25px);
        opacity: 0.5;
      }
    }

    /* Philosophy signature at bottom */
    #philosophy {
      position: fixed;
      bottom: clamp(16px, 3vw, 40px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(11px, 1.5vw, 16px);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: rgba(201, 168, 76, 0.35);
      text-align: center;
      max-width: 85%;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 6.5s forwards;
      pointer-events: none;
      white-space: normal;
    }

    /* ════════════════════════════════════════════════════════════
       RESPONSIVE DESIGN
       ════════════════════════════════════════════════════════════ */

    @media (max-width: 1024px) {
      #phase3 {
        flex-direction: row;
        justify-content: center;
        gap: clamp(20px, 5vw, 50px);
      }

      .frame-wrapper {
        max-width: 380px;
      }

      #frame-divider {
        opacity: 1 !important;
      }
    }

    @media (max-width: 768px) {
      #phase3 {
        flex-direction: row;
        gap: clamp(15px, 4vw, 35px);
      }

      .frame-wrapper {
        flex: 1;
        min-width: 160px;
        max-width: 280px;
      }

      .frame {
        border: 2px solid var(--gold);
        box-shadow: inset 0 0 0 5px var(--bg), inset 0 0 0 7px var(--gold),
                    0 0 25px rgba(201, 168, 76, 0.1);
      }

      .frame::before, .frame::after {
        width: 16px;
        height: 16px;
        border-width: 1.5px;
        opacity: 0.5;
      }

      .frame-wrapper:hover .frame {
        transform: translateY(-5px);
      }

      .frame-content {
        padding: clamp(16px, 4vw, 28px);
      }

      .frame-title {
        font-size: clamp(28px, 5vw, 44px);
      }

      .frame-tag {
        font-size: 7px;
      }

      .frame-kr {
        font-size: clamp(11px, 1.4vw, 14px);
      }

      .frame-cta {
        font-size: 9px;
        padding: 12px 28px;
      }

      #frame-divider {
        font-size: 18px;
      }

      #philosophy {
        font-size: clamp(10px, 1.3vw, 13px);
        bottom: clamp(12px, 2vw, 28px);
      }
    }

    @media (max-width: 600px) {
      #phase3 {
        flex-direction: column;
        gap: clamp(25px, 6vw, 45px);
        padding: clamp(16px, 4vw, 32px);
      }

      .frame-wrapper {
        width: 100%;
        max-width: 100%;
        aspect-ratio: auto;
        min-height: 280px;
      }

      .frame {
        border: 2px solid var(--gold);
        box-shadow: inset 0 0 0 4px var(--bg), inset 0 0 0 6px var(--gold),
                    0 0 20px rgba(201, 168, 76, 0.08);
      }

      .frame-wrapper:hover .frame {
        transform: translateY(-4px);
        box-shadow: inset 0 0 0 4px var(--bg), inset 0 0 0 6px var(--gold),
                    0 10px 40px rgba(201, 168, 76, 0.18);
      }

      #frame-divider {
        display: none;
      }

      #sig-en {
        font-size: clamp(40px, 9vw, 80px);
      }

      #sig-kr-top {
        font-size: clamp(12px, 2vw, 18px);
      }

      #philosophy {
        font-size: clamp(10px, 2vw, 12px);
        bottom: clamp(10px, 2vw, 16px);
      }
    }

    @media (max-width: 400px) {
      #phase3 {
        padding: clamp(12px, 3vw, 24px);
        gap: clamp(20px, 5vw, 35px);
      }

      .frame-wrapper {
        min-height: 240px;
      }

      .frame-title {
        font-size: clamp(24px, 5vw, 36px);
      }

      .frame-tag {
        display: none;
      }

      .frame-kr {
        font-size: clamp(11px, 1.8vw, 13px);
        margin-bottom: 12px;
      }

      .frame-cta {
        padding: 10px 24px;
        font-size: 9px;
      }

      #philosophy {
        font-size: clamp(9px, 1.8vw, 11px);
      }
    }
  </style>
</head>
<body>

<!-- PHASE 1: THE VOID -->
<div id="phase1">
  <div id="phase1-container">
    <div id="spark"></div>
    <div id="sig-kr-top">머리가 비어야 할 수 있었던 것</div>
    <div id="sig-line"></div>
    <div id="sig-en">ARIS KIM</div>
    <div id="sig-kr-bottom">아 리 스 김</div>
  </div>
</div>

<!-- PHASE 2: THE REVELATION -->
<div id="phase2">
  <div id="void-left"></div>

<!-- PHILOSOPHY SIGNATURE -->
<div id="philosophy">새로운 것을 하지 않으면 창의적이지 않습니다</div>

<script>
  // Check for skip parameter
  const params = new URLSearchParams(window.location.search);
  const skipToEnd = params.get('skip') === '1';

  if (skipToEnd) {
    // Skip to Phase 3 immediately
    document.getElementById('phase1').style.display = 'none';
    document.getElementById('phase2').style.display = 'none';
    document.getElementById('phase3').classList.add('show');
    document.getElementById('philosophy').style.opacity = '1';
    document.getElementById('frame-divider').style.opacity = '1';
  } else {
    // Timeline for full theatrical sequence
    // Phase 1 fade-out at 2.5s (transition lasts 1.2s, completes at 3.7s)
    setTimeout(() => {
      document.getElementById('phase1').classList.add('fade-out');
    }, 2500);

    // Phase 2 show at 2.7s (overlaps with fade-out for dramatic effect)
    setTimeout(() => {
      document.getElementById('phase2').classList.add('show');
    }, 2700);

    // Phase 2 fade-out at 5s
    setTimeout(() => {
      document.getElementById('phase2').classList.add('fade-out');
    }, 5000);

    // Phase 3 show at 5.3s
    setTimeout(() => {
      document.getElementById('phase3').classList.add('show');
    }, 5300);
  }

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
      window.location.href = 'story.html';
    } else if (e.key === 'ArrowRight') {
      window.location.href = 'booking.html';
    }
  });
</script>
