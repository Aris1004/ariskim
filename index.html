<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS KIM | 아리스김</title>
<meta property="og:type" content="website">
<meta property="og:title" content="ARIS KIM | 아리스김">
<meta property="og:description" content="뉴욕 카네기홀 · 예술의전당 최초 1호 아티스트 · 아시아 탱고 챔피언">
<meta property="og:image" content="https://ariskim.netlify.app/og_sign.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+KR:wght@200;300;400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C9A84C;
  --bg: #0A0908;
  --text: #F2EDE4;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
}
a, a:link, a:visited {
  color: var(--text);
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
a:hover, a:active { color: var(--text); }

/* ════════════════════════════════════════════════════════════
   PHASE 1: MINIMAL SIGNATURE (0-4s)
   ════════════════════════════════════════════════════════════ */
#phase1 {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1) 3.5s;
  pointer-events: auto;
}
#phase1.fade-out {
  opacity: 0;
  pointer-events: none;
}
#phase1-container {
  text-align: center;
  position: relative;
}

/* Horizontal line (expands from center) */
#sig-line {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 1px;
  background: var(--gold);
  transform: translateX(-50%);
  opacity: 0;
  animation: expandLine 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
}
@keyframes expandLine {
  0% { width: 0; opacity: 1; }
  100% { width: 200px; opacity: 1; }
}

/* "ARIS KIM" in Cinzel */
#sig-en {
  font-family: 'Cinzel', serif;
  font-size: clamp(48px, 10vw, 96px);
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text);
  margin-top: 60px;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeInUpSubtle 1s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
}

/* "아 리 스 김" in Noto Serif KR */
#sig-kr {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(14px, 2.5vw, 24px);
  font-weight: 200;
  letter-spacing: 0.6em;
  color: rgba(201, 168, 76, 0.5);
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) 2.2s forwards;
}

@keyframes fadeInUpSubtle {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* ════════════════════════════════════════════════════════════
   PHASE 2: CINEMATIC PHOTO (4-6.5s)
   ════════════════════════════════════════════════════════════ */
#phase2 {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: linear-gradient(135deg, rgba(10, 9, 8, 0.8), rgba(10, 9, 8, 0.8)),
              url('images/hero_led_stage.jpg') center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
#phase2.show {
  opacity: 1;
}
#phase2.fade-out {
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

#phase2-content {
  text-align: center;
  position: relative;
  z-index: 2;
}
#phase2-content::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('images/hero_led_stage.jpg') center / cover;
  filter: brightness(0.4);
  pointer-events: none;
  z-index: -1;
}

#p2-tag {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.5em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 4.8s forwards;
}

#p2-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(60px, 12vw, 140px);
  font-weight: 900;
  letter-spacing: 0.08em;
  color: white;
  line-height: 1.1;
  margin: 0 auto 20px;
  opacity: 0;
  animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) 4.5s forwards;
}

#p2-divider {
  width: 60px;
  height: 1px;
  background: var(--gold);
  margin: 20px auto 20px;
  opacity: 0;
  animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 4.9s forwards;
}

#p2-subtitle {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(11px, 1.8vw, 18px);
  font-weight: 300;
  letter-spacing: 0.15em;
  color: rgba(242, 237, 228, 0.7);
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) 5.1s forwards;
}

/* ════════════════════════════════════════════════════════════
   PHASE 3: TWO-PANEL NAVIGATION (6.5s+)
   ════════════════════════════════════════════════════════════ */
#phase3 {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
#phase3.show {
  opacity: 1;
  pointer-events: auto;
}

.panel {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  transition: flex 0.85s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
}

/* Panel backgrounds and overlays */
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.18);
  transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}
.panel:hover::before {
  filter: brightness(0.35);
}

#panel-left::before {
  background-image: url('images/img_black_jacket.jpg');
  background-position: center top;
}
#panel-right::before {
  background-image: url('images/img_gold_jacket.jpg');
  background-position: center top;
}

/* Scaling on hover */
.panel:hover {
  flex: 1.15;
}

/* Panel content */
.panel-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 60px 40px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.panel:hover .panel-content {
  opacity: 1;
  transform: translateY(0);
}

/* Animations for panels entering */
#panel-left {
  transform: translateX(-100%);
  animation: slideInLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1) 6.5s forwards;
}
#panel-right {
  transform: translateX(100%);
  animation: slideInRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 6.6s forwards;
}

@keyframes slideInLeft {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(0); }
}
@keyframes slideInRight {
  0% { transform: translateX(100%); }
  100% { transform: translateX(0); }
}

.panel-tag {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.5em;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 20px;
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1.2;
  margin-bottom: 16px;
}

#panel-left .panel-title { color: rgba(242, 237, 228, 0.95); }
#panel-right .panel-title { color: var(--gold); }

.panel-kr {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(12px, 1.5vw, 16px);
  font-weight: 200;
  letter-spacing: 0.15em;
  margin-bottom: 24px;
}

#panel-left .panel-kr { color: rgba(242, 237, 228, 0.6); }
#panel-right .panel-kr { color: rgba(201, 168, 76, 0.6); }

.panel-desc {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1.8;
  max-width: 300px;
  margin: 0 auto 32px;
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.panel:hover .panel-desc { opacity: 0.7; }

#panel-left .panel-desc { color: rgba(242, 237, 228, 0.7); }
#panel-right .panel-desc { color: rgba(201, 168, 76, 0.7); }

.panel-cta {
  display: inline-block;
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  padding: 14px 36px;
  border: 1px solid;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

#panel-left .panel-cta {
  border-color: rgba(242, 237, 228, 0.4);
  color: rgba(242, 237, 228, 0.8);
}
#panel-left .panel-cta:hover {
  background: rgba(242, 237, 228, 0.12);
  border-color: rgba(242, 237, 228, 0.8);
  color: white;
}

#panel-right .panel-cta {
  border-color: var(--gold);
  color: var(--gold);
}
#panel-right .panel-cta:hover {
  background: var(--gold);
  color: var(--bg);
}

/* Corner marks */
.corner {
  position: absolute;
  width: 10px;
  height: 10px;
  opacity: 0.12;
  transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 3;
}
.panel:hover .corner { opacity: 0.3; }

.corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

/* Divider between panels */
#panel-divider {
  position: absolute;
  left: 50%;
  top: 0;
  width: 1px;
  height: 100%;
  background: linear-gradient(180deg,
              transparent 0%,
              var(--gold) 15%,
              var(--gold) 85%,
              transparent 100%);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) 7.3s forwards;
}
#panel-divider::after {
  content: '✦';
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  color: var(--gold);
  font-size: 10px;
  opacity: 0.5;
}

/* Bottom signature */
#bottom-sig {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 0.5em;
  color: rgba(201, 168, 76, 0.1);
  white-space: nowrap;
  pointer-events: none;
  text-transform: uppercase;
}

/* ════════════════════════════════════════════════════════════
   RESPONSIVE DESIGN
   ════════════════════════════════════════════════════════════ */

@media (max-width: 1200px) {
  #p2-title { font-size: clamp(48px, 10vw, 120px); }
  .panel-title { font-size: clamp(28px, 5.5vw, 56px); }
}

@media (max-width: 768px) {
  #phase3 { flex-direction: row; }
  .panel { flex: 1; }
  .panel:hover { flex: 1.1; }
  #panel-divider { opacity: 1; }
  .panel-content {
    padding: 40px 24px;
    opacity: 1;
    transform: none !important;
  }
  .panel:hover .panel-content { transform: none; }
  .panel-tag { font-size: 7px; }
  .panel-title { font-size: clamp(22px, 5vw, 40px); }
  .panel-kr { font-size: clamp(10px, 1.3vw, 13px); }
  .panel-desc { display: none; }
  .panel-cta { padding: 10px 28px; font-size: 10px; }
  .corner { width: 8px; height: 8px; }
  #bottom-sig { font-size: 6px; }
}

@media (max-width: 480px) {
  #phase3 { flex-direction: column; }
  .panel {
    flex: 1 !important;
    min-height: 50vh;
  }
  .panel:hover { flex: 1 !important; }
  #panel-divider {
    left: 0 !important;
    top: 50% !important;
    width: 100% !important;
    height: 1px !important;
  }
  #panel-divider::after {
    width: 100%;
    height: 100%;
  }
  .panel-content {
    padding: 32px 20px;
  }
  .panel-tag { display: none; }
  .panel-desc { display: none; }
  .panel-title { font-size: clamp(20px, 6vw, 32px); }
  .panel-kr { font-size: clamp(11px, 2.5vw, 14px); }
  .panel-cta { padding: 12px 24px; font-size: 10px; }
  .corner { display: none; }
  #bottom-sig { display: none; }
  #p2-title { font-size: clamp(36px, 10vw, 80px); }
  #p2-tag { font-size: 8px; }
  #p2-subtitle { font-size: clamp(10px, 1.5vw, 14px); }
}
</style>
</head>
<body>

<!-- PHASE 1: MINIMAL SIGNATURE -->
<div id="phase1">
  <div id="phase1-container">
    <div id="sig-line"></div>
    <div id="sig-en">ARIS KIM</div>
    <div id="sig-kr">아 리 스 김</div>
  </div>
</div>

<!-- PHASE 2: CINEMATIC PHOTO -->
<div id="phase2">
  <div id="phase2-content">
    <div id="p2-tag">SAXOPHONE · MEDIA ART · TANGO</div>
    <h1 id="p2-title">ARIS KIM</h1>
    <div id="p2-divider"></div>
    <div id="p2-subtitle">뉴욕 카네기홀 · 예술의전당 최초 1호 · 아시아 탱고 챔피언</div>
  </div>
</div>

<!-- PHASE 3: TWO-PANEL NAVIGATION -->
<div id="phase3">
  <a href="story.html" id="panel-left" class="panel">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="panel-content">
      <span class="panel-tag">Discover</span>
      <h2 class="panel-title">STORY</h2>
      <div class="panel-kr">삶의 음악</div>
      <p class="panel-desc">뉴욕부터 서울까지, 음악과 예술로 연결된 여정</p>
      <div class="panel-cta">EXPLORE</div>
    </div>
  </a>

  <div id="panel-divider"></div>

  <a href="booking.html" id="panel-right" class="panel">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="panel-content">
      <span class="panel-tag">Let's Create</span>
      <h2 class="panel-title">BOOKING</h2>
      <div class="panel-kr">예술의 약속</div>
      <p class="panel-desc">공연, 협업, 프로젝트 문의</p>
      <div class="panel-cta">GET IN TOUCH</div>
    </div>
  </a>
</div>

<div id="bottom-sig">ARISHOW COMPANY</div>

<script>
// Check for skip parameter
const params = new URLSearchParams(window.location.search);
const skipToEnd = params.get('skip') === '1';

if (skipToEnd) {
  // Skip to Phase 3 immediately
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'none';
  document.getElementById('phase3').classList.add('show');
} else {
  // Timeline for full sequence
  // Phase 1 ends at 4s
  setTimeout(() => {
    document.getElementById('phase1').classList.add('fade-out');
  }, 3500);

  // Phase 2 starts at 4s (show)
  setTimeout(() => {
    document.getElementById('phase2').classList.add('show');
  }, 4000);

  // Phase 2 ends at 5.5s (fade-out)
  setTimeout(() => {
    document.getElementById('phase2').classList.add('fade-out');
  }, 5500);

  // Phase 3 starts at 6.5s (show)
  setTimeout(() => {
    document.getElementById('phase3').classList.add('show');
  }, 6500);
}

// Keyboard navigation (ArrowLeft → story, ArrowRight → booking)
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    window.location.href = 'story.html';
  } else if (e.key === 'ArrowRight') {
    window.location.href = 'booking.html';
  }
});
</script>

</body>
</html>
