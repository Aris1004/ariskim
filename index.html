<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS KIM | 아리스김</title>
<meta property="og:type" content="website">
<meta property="og:title" content="ARIS KIM | 아리스김">
<meta property="og:description" content="뉴욕 카네기홀 · 예술의전당 최초 1호 아티스트 · 아시아 탱고 챔피언">
<meta property="og:image" content="https://ariskim.netlify.app/og_sign.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+KR:wght@200;300;400&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A84C;--bg:#0A0908;--text:#F2EDE4;--gold-subtle:rgba(201,168,76,0.3);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;}
a,a:link,a:visited{color:var(--text);text-decoration:none;-webkit-tap-highlight-color:transparent;}
a:hover,a:active{color:var(--text);}

/* ═══════════════════════════════════════
   VIDEO INTRO + SPOTLIGHT
   ═══════════════════════════════════════ */
#videoIntro{
  position:fixed;inset:0;z-index:99999;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#videoIntro.fade{animation:introFade 1.5s ease forwards;}
#videoIntro.done{display:none;}

#introVideo{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
}

/* Spotlight cone from top */
.spotlight{
  position:absolute;
  top:-10%;left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-top:110vh solid rgba(255,245,200,0.06);
  opacity:0;
  filter:blur(30px);
  pointer-events:none;
  z-index:2;
  will-change:opacity;
}
.spotlight.on{
  animation:spotlightOn 2s ease forwards;
}
@keyframes spotlightOn{
  0%{opacity:0;transform:translateX(-50%) scaleX(0.3);}
  40%{opacity:1;transform:translateX(-50%) scaleX(0.6);}
  100%{opacity:1;transform:translateX(-50%) scaleX(1);}
}

/* Spotlight glow at top — hidden */
.spotlight-source{display:none;}

/* Circular spotlight pool on the floor */
.spotlight-pool{
  position:absolute;
  bottom:15%;left:50%;
  transform:translateX(-50%);
  width:300px;height:80px;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,245,200,0.12) 0%,rgba(201,168,76,0.05) 40%,transparent 70%);
  filter:blur(20px);
  opacity:0;
  z-index:2;
  will-change:opacity;
}
.spotlight-pool.on{
  animation:poolOn 2s ease 0.5s forwards;
}
@keyframes poolOn{
  0%{opacity:0;}
  100%{opacity:1;}
}

/* Dark vignette over video */
.video-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 50% at center,transparent 0%,rgba(0,0,0,0.7) 100%);
  z-index:1;
  pointer-events:none;
}

/* Enter Gate */
#enterGate{
  position:fixed;inset:0;z-index:999999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity 1s ease;
}
#enterGate.gone{opacity:0;pointer-events:none;}
#enterGate .gate-logo{
  font-family:'Cinzel',serif;
  font-size:clamp(18px,3vw,36px);
  font-weight:700;letter-spacing:0.2em;
  color:var(--text);
  margin-bottom:48px;
  text-shadow:0 0 30px rgba(201,168,76,0.2);
}
#enterGate .gate-enter{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:0.6em;
  color:var(--gold);
  padding:14px 40px;
  border:1px solid rgba(201,168,76,0.3);
  transition:all 0.4s;
  position:relative;
  overflow:hidden;
}
#enterGate .gate-enter::before{
  content:'';
  position:absolute;
  top:-200%;left:-100%;
  width:50%;height:500%;
  background:linear-gradient(90deg,transparent,rgba(255,245,200,0.4),rgba(201,168,76,0.25),transparent);
  transform:skewX(-30deg);
  animation:shimmerSweep 1.6s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes shimmerSweep{
  0%{left:-100%;}
  100%{left:140%;}
}
#enterGate .gate-enter:hover{
  border-color:var(--gold);
  background:rgba(201,168,76,0.08);
}

/* Typewriter subtitle */
#introSubtitle{
  position:absolute;
  bottom:18%;left:50%;
  transform:translateX(-50%);
  z-index:10;
  font-family:'Gowun Batang','Batang','궁서',serif;
  font-size:clamp(16px,2.5vw,28px);
  font-weight:700;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.92);
  text-shadow:0 0 20px rgba(0,0,0,0.8),0 0 40px rgba(0,0,0,0.5);
  white-space:pre-line;
  text-align:center;
  overflow:hidden;
  border-right:2px solid rgba(255,255,255,0.7);
  animation:blink-cursor 0.6s step-end infinite;
}
#introSubtitle.done-typing{
  border-right-color:transparent;
  animation:none;
}
@keyframes blink-cursor{
  0%,100%{border-right-color:rgba(255,255,255,0.7);}
  50%{border-right-color:transparent;}
}

@keyframes introFade{
  0%{opacity:1;}
  100%{opacity:0;pointer-events:none;}
}

/* ═══════════════════════════════════════
   PHASE 1: SPOTLIGHT BEAM + ARISHOW
   ═══════════════════════════════════════ */
#phase1{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  transition:opacity 1.4s ease;
}
#phase1.fade-out{opacity:0;pointer-events:none;}
#spotCvs{position:absolute;inset:0;width:100%;height:100%;}

/* ═══════════════════════════════════════
   PHASE 2: THE REVELATION
   ═══════════════════════════════════════ */
#phase2{
  position:fixed;inset:0;z-index:200;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase2.show{opacity:1;}
#phase2.fade-out{opacity:0;transition:opacity 1s ease;}

#void-left,#void-right{
  position:absolute;top:0;width:50%;height:100%;
  background:var(--bg);z-index:2;
  transition:transform 1.8s cubic-bezier(0.77,0,0.18,1);
}
#void-left{left:0;}
#void-right{right:0;}
#phase2.show #void-left{transform:translateX(-100%);}
#phase2.show #void-right{transform:translateX(100%);}

#hero-image{
  position:absolute;inset:0;
  background:url('images/screw_photo.jpg') center/cover no-repeat;
  filter:brightness(0.6);
  animation:kenBurns 12s ease-in-out infinite alternate;
}
@keyframes kenBurns{
  0%{transform:scale(1);}
  100%{transform:scale(1.08);}
}

#hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.4) 0%,rgba(10,9,8,0.1) 40%,rgba(10,9,8,0.6) 100%);
  z-index:1;
}

#phase2-content{
  position:absolute;bottom:12%;left:0;right:0;
  text-align:center;z-index:3;
  opacity:0;
  animation:fadeUp 1.2s ease 2s forwards;
}
#p2-tag{
  font-family:'Cinzel',serif;font-size:clamp(7px,0.9vw,10px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
#p2-kr-top{
  font-family:'Noto Serif KR',serif;font-size:clamp(10px,1.2vw,14px);
  font-weight:200;letter-spacing:0.25em;
  color:rgba(242,237,228,0.7);
  line-height:2.2;
}

@keyframes fadeUp{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* ═══════════════════════════════════════
   PHASE 3: THE PORTAL — Gold Frame Cards
   ═══════════════════════════════════════ */
#phase3{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(20px,3vw,60px);
  padding:clamp(20px,4vh,60px) clamp(20px,4vw,80px);
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase3.show{opacity:1;pointer-events:auto;}

/* Golden floating particles */
.golden-dust{
  position:fixed;border-radius:50%;pointer-events:none;z-index:101;
  background:radial-gradient(circle,rgba(201,168,76,0.6),transparent);
  opacity:0;
}
#phase3.show ~ .golden-dust{opacity:1;}
.dust-1{width:3px;height:3px;top:18%;left:12%;animation:floatDust 8s ease-in-out infinite;}
.dust-2{width:2px;height:2px;top:72%;left:8%;animation:floatDust 11s ease-in-out 1s infinite;}
.dust-3{width:4px;height:4px;top:35%;right:15%;animation:floatDust 9s ease-in-out 2s infinite;}
.dust-4{width:2px;height:2px;top:60%;right:10%;animation:floatDust 10s ease-in-out 0.5s infinite;}
.dust-5{width:3px;height:3px;top:85%;left:45%;animation:floatDust 12s ease-in-out 3s infinite;}
.dust-6{width:2px;height:2px;top:15%;right:40%;animation:floatDust 7s ease-in-out 1.5s infinite;}

@keyframes floatDust{
  0%,100%{transform:translateY(0) translateX(0);opacity:0.3;}
  25%{transform:translateY(-20px) translateX(10px);opacity:0.7;}
  50%{transform:translateY(-8px) translateX(-8px);opacity:0.5;}
  75%{transform:translateY(-25px) translateX(5px);opacity:0.8;}
}

/* Card — gold framed photo card */
.card{
  position:relative;flex:1;max-width:520px;
  height:clamp(400px,75vh,800px);
  border:1.5px solid rgba(201,168,76,0.55);
  overflow:hidden;cursor:pointer;
  text-decoration:none;display:block;
  transition:transform 0.6s ease,box-shadow 0.6s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(201,168,76,0.15),0 0 80px rgba(201,168,76,0.08);
}

.card-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:brightness(0.65);
  transition:filter 0.7s,transform 0.7s;
}
.card:hover .card-img{filter:brightness(0.8);transform:scale(1.03);}
#card-story .card-img{background-image:url('images/hero_led_stage.jpg');}
#card-booking .card-img{background-image:url('images/hero_a5_klimt_led.jpg');}

.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.2) 0%,rgba(10,9,8,0.05) 30%,rgba(10,9,8,0.55) 100%);
  z-index:1;
  overflow:hidden;
}
.card-overlay::after{
  content:'';
  position:absolute;
  top:-200%;left:-100%;
  width:50%;height:500%;
  background:linear-gradient(90deg,transparent,rgba(255,245,200,0.08),rgba(201,168,76,0.05),transparent);
  transform:skewX(-30deg);
  animation:cardShimmer 3s ease-in-out infinite;
  pointer-events:none;
}

.card-content{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
}

.card-discover{
  font-family:'Cinzel',serif;font-size:clamp(8px,1vw,11px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
.card-title{
  font-family:'Cinzel',serif;font-size:clamp(28px,4vw,56px);
  font-weight:900;letter-spacing:0.1em;
  color:var(--text);margin-bottom:12px;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.card-kr{
  font-family:'Noto Serif KR',serif;font-size:clamp(11px,1.2vw,15px);
  font-weight:200;letter-spacing:0.3em;
  color:rgba(242,237,228,0.5);margin-bottom:28px;
}
.card-cta{
  display:inline-block;font-family:'Cinzel',serif;
  font-size:clamp(11px,1.1vw,14px);font-weight:700;
  letter-spacing:0.3em;padding:14px 36px;
  border:1px solid rgba(242,237,228,0.3);
  color:rgba(242,237,228,0.9);
  transition:all 0.35s;
  position:relative;
  overflow:hidden;
}
.card-cta::before{
  content:'';
  position:absolute;
  top:-200%;left:-100%;
  width:50%;height:500%;
  background:linear-gradient(90deg,transparent,rgba(255,245,200,0.3),rgba(201,168,76,0.18),transparent);
  transform:skewX(-30deg);
  animation:cardShimmer 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes cardShimmer{
  0%{left:-100%;}
  25%{left:140%;}
  50%{left:-100%;}
  66%{left:-100%;}
  100%{left:-100%;}
}
.card-cta:hover{
  background:rgba(201,168,76,0.15);
  border-color:var(--gold);color:var(--text);
}

/* Golden corner accents inside card */
.card::before,.card::after{
  content:'';position:absolute;width:20px;height:20px;
  z-index:3;opacity:0.4;transition:opacity 0.4s;
}
.card:hover::before,.card:hover::after{opacity:0.8;}
.card::before{bottom:16px;left:16px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.card::after{bottom:16px;right:16px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

/* Signature */
#sig{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
  z-index:999;font-family:'Cinzel',serif;font-size:7px;
  letter-spacing:0.5em;color:rgba(201,168,76,0.12);
  white-space:nowrap;pointer-events:none;
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */

/* Tablet */
@media(min-width:769px) and (max-width:1024px){
  .card{max-width:420px;}
  .card-title{font-size:clamp(24px,3.5vw,40px);}
}

/* Small tablet / large phone landscape */
@media(min-width:481px) and (max-width:768px){
  #phase3{flex-direction:row;gap:16px;padding:20px;}
  .card{max-width:none;height:clamp(350px,70vh,600px);}
  .card-title{font-size:clamp(20px,3vw,32px);}
  .card-kr{font-size:10px;}
  .card-discover{font-size:8px;}
  .card-cta{padding:10px 24px;font-size:9px;}
}

/* Phone */
@media(max-width:480px){
  html,body{overflow-y:auto!important;overflow-x:hidden!important;}
  #phase3{
    position:relative!important;
    flex-direction:column;gap:16px;
    padding:16px;min-height:100vh;
    align-items:stretch;
  }
  .card{flex:none;max-width:none;height:clamp(300px,45vh,500px);}
  .card-title{font-size:clamp(24px,7vw,36px);}
  .card-kr{font-size:11px;}
  .card-cta{padding:12px 28px;font-size:10px;}
  #sig{display:none;}
}

/* Galaxy Z Fold5 unfolded & square-ish tablet */
@media(min-width:481px) and (max-width:900px) and (min-aspect-ratio:3/4) and (max-aspect-ratio:5/4){
  html,body{overflow-y:auto!important;overflow-x:hidden!important;}
  #phase3{
    position:relative!important;
    flex-direction:column!important;gap:20px;
    padding:24px;min-height:100vh;
    align-items:stretch;
  }
  .card{flex:none;max-width:none;height:clamp(320px,42vh,480px);}
  .card-title{font-size:clamp(26px,5vw,42px);}
  .card-kr{font-size:12px;}
  .card-cta{padding:14px 32px;font-size:11px;}
}
</style>
</head>
<body>

<!-- ENTER GATE -->
<div id="enterGate">
  <div class="gate-logo">ARIS KIM</div>
  <div class="gate-enter">E N T E R</div>
</div>

<!-- VIDEO INTRO + SPOTLIGHT -->
<div id="videoIntro">
  <video id="introVideo" playsinline preload="auto">
    <source src="images/intro.mp4" type="video/mp4">
  </video>
  <div class="video-vignette"></div>
  <div class="spotlight" id="spotlight"></div>
  <div class="spotlight-source" id="spotlightSrc"></div>
  <div class="spotlight-pool" id="spotlightPool"></div>
  <div id="introSubtitle"></div>
</div>

<!-- PHASE 1: SPOTLIGHT BEAM + ARISHOW -->
<div id="phase1">
  <canvas id="spotCvs"></canvas>
  <canvas id="crackCvs" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;"></canvas>
  <div id="flash" style="position:absolute;inset:0;opacity:0;pointer-events:none;z-index:3;"></div>
</div>

<!-- PHASE 2: THE REVELATION -->
<div id="phase2">
  <div id="void-left"></div>
  <div id="void-right"></div>
  <div id="hero-image"></div>
  <div id="hero-overlay"></div>
  <div id="phase2-content">
    <div id="p2-tag">SAXOPHONE · MEDIA ART · TANGO</div>
    <div id="p2-kr-top">뉴욕 카네기홀<br>예술의전당 최초 1호<br>아시아 탱고 챔피언</div>
  </div>
</div>

<!-- PHASE 3: THE PORTAL — Gold Frame Cards -->
<div id="phase3">
  <a class="card" id="card-story" href="story.html">
    <div class="card-img"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <span class="card-discover">D I S C O V E R</span>
      <h1 class="card-title">STORY</h1>
      <p class="card-kr">삶의 음악</p>
      <div class="card-cta">여정</div>
    </div>
  </a>
  <a class="card" id="card-booking" href="booking.html">
    <div class="card-img"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <span class="card-discover">D I S C O V E R</span>
      <h1 class="card-title">ARISHOW</h1>
      <p class="card-kr">CONCERT</p>
      <div class="card-cta">공연기획</div>
    </div>
  </a>
</div>

<!-- Golden floating particles -->
<div class="golden-dust dust-1"></div>
<div class="golden-dust dust-2"></div>
<div class="golden-dust dust-3"></div>
<div class="golden-dust dust-4"></div>
<div class="golden-dust dust-5"></div>
<div class="golden-dust dust-6"></div>

<div id="sig">ARISHOW COMPANY · ARIS KIM</div>

<script>
/* ═══════════════════════════════════════
   ARIS KIM — THE PORTAL — INDEX
   Enter Gate → Video Intro → Spotlight Beam → Phases
   ═══════════════════════════════════════ */

var enterGate = document.getElementById('enterGate');
var videoIntro = document.getElementById('videoIntro');
var introVideo = document.getElementById('introVideo');
var spotlight = document.getElementById('spotlight');
var spotlightSrc = document.getElementById('spotlightSrc');
var spotlightPool = document.getElementById('spotlightPool');

/* ─── AUDIO ENGINE (Web Audio API) ─── */
var AC = null;

function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function makeReverb(dur, decay){
  dur = dur||3; decay = decay||2;
  var len = AC.sampleRate*dur;
  var buf = AC.createBuffer(2,len,AC.sampleRate);
  for(var ch=0;ch<2;ch++){
    var d=buf.getChannelData(ch);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  var rv=AC.createConvolver(); rv.buffer=buf; return rv;
}

function noiseBurst(freq, Q, vol, atk, dcy, delay){
  if(!AC) return;
  delay = delay||0;
  var t = AC.currentTime+delay;
  var dur = atk+dcy+0.05;
  var buf = AC.createBuffer(1, Math.ceil(AC.sampleRate*dur), AC.sampleRate);
  var d = buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src = AC.createBufferSource(); src.buffer=buf;
  var bp = AC.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=freq; bp.Q.value=Q;
  var g = AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol, t+atk);
  g.gain.exponentialRampToValueAtTime(0.001, t+atk+dcy);
  src.connect(bp); bp.connect(g); g.connect(AC.destination);
  src.start(t); src.stop(t+dur+0.01);
}

/* A. Pressure build — air compressing before beam */
function playPressureBuild(delay, dur){
  if(!AC) return;
  delay=delay||0; dur=dur||2.8;
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src=AC.createBufferSource(); src.buffer=buf;
  var lp=AC.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(35,t);
  lp.frequency.linearRampToValueAtTime(90,t+dur);
  lp.Q.value=1.5;
  var g=AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.9,t+dur*0.5);
  g.gain.linearRampToValueAtTime(1.4,t+dur);
  g.gain.linearRampToValueAtTime(0,t+dur+0.4);
  var rv=makeReverb(3,2.2);
  var rvG=AC.createGain(); rvG.gain.value=0.35;
  rv.connect(rvG); rvG.connect(AC.destination);
  src.connect(lp); lp.connect(g);
  g.connect(AC.destination); g.connect(rv);
  src.start(t);
}

/* B. Beam swoosh — high→low frequency whoosh */
function playBeamSwoosh(delay){
  if(!AC) return;
  delay=delay||0;
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,AC.sampleRate*0.9,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src=AC.createBufferSource(); src.buffer=buf;
  var hp=AC.createBiquadFilter(); hp.type='highpass';
  hp.frequency.setValueAtTime(4000,t);
  hp.frequency.exponentialRampToValueAtTime(200,t+0.5);
  var g=AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.7,t+0.05);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.85);
  var rv=makeReverb(3.5,1.5);
  var rvG=AC.createGain(); rvG.gain.value=0.5;
  rv.connect(rvG); rvG.connect(AC.destination);
  src.connect(hp); hp.connect(g);
  g.connect(AC.destination); g.connect(rv);
  src.start(t);
}

/* C. Reveal shimmer — gold reflecting light */
function playRevealShimmer(delay){
  if(!AC) return;
  delay=delay||0;
  noiseBurst(2800, 8, 0.6, 0.008, 1.8, delay);
  noiseBurst(1400, 5, 0.35, 0.015, 2.4, delay+0.05);
  noiseBurst(600, 3, 0.2, 0.02, 3.0, delay+0.12);
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*0.15),AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
  var src=AC.createBufferSource(); src.buffer=buf;
  var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=4;
  var rv=makeReverb(6,1.0);
  var rvG=AC.createGain(); rvG.gain.value=1.2;
  rv.connect(rvG); rvG.connect(AC.destination);
  var g=AC.createGain();
  g.gain.setValueAtTime(1.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(bp); bp.connect(g); g.connect(rv); src.start(t);
}

/* D. Seismic sub-bass boom */
function playSeismicBoom(delay){
  if(!AC) return;
  delay=delay||0;
  var t=AC.currentTime+delay;
  var sub=AC.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(28,t);
  sub.frequency.exponentialRampToValueAtTime(12,t+2.5);
  var sg=AC.createGain();
  sg.gain.setValueAtTime(0,t); sg.gain.linearRampToValueAtTime(4.0,t+0.006);
  sg.gain.exponentialRampToValueAtTime(0.001,t+3.0);
  sub.connect(sg); sg.connect(AC.destination);
  sub.start(t); sub.stop(t+3.2);
  noiseBurst(40, 1.5, 2.5, 0.01, 2.0, delay);
  noiseBurst(75, 2, 1.2, 0.02, 1.5, delay+0.05);
}

/* Luxury click sound */
function playClickSound(){
  if(!AC || AC.state!=='running') return;
  noiseBurst(4000, 12, 0.55, 0.001, 0.012, 0);
  noiseBurst(900, 6, 0.25, 0.002, 0.020, 0);
  var t=AC.currentTime;
  var sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=55;
  var sg=AC.createGain();
  sg.gain.setValueAtTime(0,t); sg.gain.linearRampToValueAtTime(0.45,t+0.002);
  sg.gain.exponentialRampToValueAtTime(0.001,t+0.010);
  sub.connect(sg); sg.connect(AC.destination);
  sub.start(t); sub.stop(t+0.012);
}
document.addEventListener('click', function(e){
  if(e.target.closest('a, button, [onclick]')) playClickSound();
}, true);

/* ─── CANVAS SPOTLIGHT BEAM ─── */
var spotCvs = document.getElementById('spotCvs');
var spotX = spotCvs.getContext('2d');
var crackCvs = document.getElementById('crackCvs');
var crackX = crackCvs.getContext('2d');

function resizeCanvas(){
  spotCvs.width = innerWidth; spotCvs.height = innerHeight;
  crackCvs.width = innerWidth; crackCvs.height = innerHeight;
}
resizeCanvas();
addEventListener('resize', resizeCanvas);

/* ─── CRACK & DEBRIS ─── */
var cracks=[], debris=[];
function addCrack(x,y,ang,len,depth){
  if(depth<=0||len<10) return;
  var ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
  cracks.push({x1:x,y1:y,x2:ex,y2:ey,a:0,maxA:0.5+Math.random()*0.35});
  var br=depth>1?(Math.random()<0.65?2:1):1;
  for(var i=0;i<br;i++) addCrack(ex,ey,ang+(Math.random()-.5)*1.3,len*(0.45+Math.random()*0.35),depth-1);
}
function spawnDebris(cx,cy,n){
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    debris.push({x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*80,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
      sz:1.5+Math.random()*3.5, a:0.9, rot:Math.random()*Math.PI*2,
      rv:(Math.random()-.5)*0.3, life:1, decay:0.014+Math.random()*0.016});
  }
}
function buildCracks(){
  cracks.length=0; debris.length=0;
  var cx=crackCvs.width*0.5, cy=crackCvs.height*0.51;
  for(var i=0;i<9;i++){
    var ang=(i/9)*Math.PI*2+(Math.random()-.5)*0.4;
    addCrack(cx,cy,ang,crackCvs.width*(0.20+Math.random()*0.28),4);
  }
  spawnDebris(cx,cy,80);
}
var crackOn=false;
function drawCracks(){
  if(!crackOn) return;
  crackX.clearRect(0,0,crackCvs.width,crackCvs.height);
  cracks.forEach(function(cr){
    cr.a=Math.min(cr.a+0.055,cr.maxA);
    crackX.beginPath(); crackX.moveTo(cr.x1,cr.y1); crackX.lineTo(cr.x2,cr.y2);
    crackX.strokeStyle='rgba(255,210,100,'+cr.a+')';
    crackX.lineWidth=0.7+cr.a*1.2;
    crackX.shadowColor='rgba(255,190,60,'+(cr.a*0.7)+')'; crackX.shadowBlur=5;
    crackX.stroke(); crackX.shadowBlur=0;
  });
  debris.forEach(function(d){
    if(d.life<=0) return;
    d.x+=d.vx; d.y+=d.vy; d.vy+=0.14; d.vx*=0.97; d.rot+=d.rv;
    d.life-=d.decay; d.a=Math.max(0,d.life*0.9);
    crackX.save(); crackX.translate(d.x,d.y); crackX.rotate(d.rot);
    crackX.fillStyle='rgba(210,170,70,'+d.a+')';
    crackX.fillRect(-d.sz/2,-d.sz/2,d.sz,d.sz); crackX.restore();
  });
  requestAnimationFrame(drawCracks);
}

/* ─── SCREEN SHAKE ─── */
function shake(dur,amp){
  var el=document.getElementById('phase1');
  var t0=performance.now();
  (function loop(){
    var p=Math.max(0,1-(performance.now()-t0)/dur);
    if(p<=0){el.style.transform='translate(0,0)';return;}
    el.style.transform='translate('+((Math.random()-.5)*amp*p*2)+'px,'+((Math.random()-.5)*amp*p*2)+'px)';
    requestAnimationFrame(loop);
  })();
}

/* ─── FLASH ─── */
function doFlash(col,a,dur){
  var f=document.getElementById('flash');
  f.style.background=col; f.style.opacity=a; f.style.transition='none';
  setTimeout(function(){ f.style.transition='opacity '+dur+'ms ease'; f.style.opacity=0; },25);
}

function runSpotlightBeam(done){
  document.fonts.load('120px "Cinzel"').then(function(){
    var txt = 'ARISHOW';
    var fs = Math.min(innerWidth * 0.11, 140);
    spotX.font = '900 ' + fs + 'px "Cinzel"';
    var tw = spotX.measureText(txt).width;
    var tx = (spotCvs.width - tw) / 2;
    var ty = spotCvs.height * 0.50;

    /* Schedule audio with spotlight */
    if(AC && AC.state === 'running'){
      playPressureBuild(0, 2.8);
      playBeamSwoosh(0.5);
      playRevealShimmer(2.4);
      playSeismicBoom(3.2);
    }

    /* Crack & shake at 3.5s after beam starts */
    setTimeout(function(){
      buildCracks(); crackOn=true; drawCracks();
      shake(2000,13);
      setTimeout(function(){shake(600,6);},900);
      setTimeout(function(){shake(300,3);},1600);
      doFlash('#fff',0.75,55);
      setTimeout(function(){doFlash('#ffaa00',0.3,150);},400);
      setTimeout(function(){doFlash('#fff',0.18,120);},900);
    },3500);

    var t0 = null, dur = 3200;
    function frame(ts){
      if(!t0) t0 = ts;
      var p = Math.min((ts - t0) / dur, 1);
      var e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;

      spotX.fillStyle = '#0A0908';
      spotX.fillRect(0, 0, spotCvs.width, spotCvs.height);

      /* Spotlight beam — triangle from top center spreading down */
      if(e > 0.04){
        var ba = Math.min(e * 1.6, 0.9);
        var cx = spotCvs.width * 0.5;
        var sp = spotCvs.width * 0.28 * Math.min(e * 1.4, 1);

        spotX.save();
        spotX.beginPath();
        spotX.moveTo(cx, 0);
        spotX.lineTo(cx - sp, spotCvs.height);
        spotX.lineTo(cx + sp, spotCvs.height);
        spotX.closePath();

        var bg = spotX.createLinearGradient(cx, 0, cx, spotCvs.height);
        bg.addColorStop(0, 'rgba(255,230,150,' + (ba * 0.26) + ')');
        bg.addColorStop(0.25, 'rgba(232,204,122,' + (ba * 0.13) + ')');
        bg.addColorStop(0.55, 'rgba(201,168,76,' + (ba * 0.07) + ')');
        bg.addColorStop(1, 'rgba(201,168,76,0)');
        spotX.fillStyle = bg;
        spotX.fill();
        spotX.restore();

        /* Glow source at top */
        var sg = spotX.createRadialGradient(cx, 0, 0, cx, 0, 85);
        sg.addColorStop(0, 'rgba(255,240,170,' + (ba * 0.55) + ')');
        sg.addColorStop(0.4, 'rgba(232,204,122,' + (ba * 0.2) + ')');
        sg.addColorStop(1, 'rgba(201,168,76,0)');
        spotX.beginPath();
        spotX.arc(cx, 0, 85, 0, Math.PI * 2);
        spotX.fillStyle = sg;
        spotX.fill();
      }

      /* Korean top text: 머리가 비었기에 할 수 있는 것! */
      if(e > 0.30){
        var ta = Math.min((e - 0.30) / 0.35, 1) * 0.7;
        spotX.save();
        spotX.globalAlpha = ta;
        spotX.font = (fs * 0.18) + 'px "Noto Serif KR"';
        spotX.fillStyle = 'rgba(242,237,228,0.85)';
        spotX.textAlign = 'center';
        spotX.shadowColor = 'rgba(201,168,76,0.4)';
        spotX.shadowBlur = 10 * ta;
        spotX.fillText('머리가 비었기에 할 수 있는 것!', spotCvs.width / 2, ty - fs * 0.55);
        spotX.restore();
      }

      /* Gold line */
      if(e > 0.33){
        var la = Math.min((e - 0.33) / 0.3, 1) * 0.5;
        var lineW = fs * 1.8 * Math.min((e - 0.33) / 0.4, 1);
        spotX.save();
        spotX.globalAlpha = la;
        spotX.strokeStyle = '#C9A84C';
        spotX.lineWidth = 1;
        spotX.shadowColor = 'rgba(201,168,76,0.4)';
        spotX.shadowBlur = 6;
        spotX.beginPath();
        spotX.moveTo(spotCvs.width / 2 - lineW / 2, ty - fs * 0.35);
        spotX.lineTo(spotCvs.width / 2 + lineW / 2, ty - fs * 0.35);
        spotX.stroke();
        spotX.restore();
      }

      /* ARISHOW text */
      if(e > 0.35){
        var sa = Math.min((e - 0.35) / 0.45, 1);
        spotX.save();
        spotX.globalAlpha = sa;
        spotX.font = '900 ' + fs + 'px "Cinzel"';
        spotX.fillStyle = '#EDE4D6';
        spotX.shadowColor = 'rgba(232,204,122,0.65)';
        spotX.shadowBlur = 20 * sa;
        spotX.fillText(txt, tx, ty);
        spotX.restore();
      }

      /* Sub-text: ARIS KIM */
      if(e > 0.65){
        var ka = Math.min((e - 0.65) / 0.28, 1) * 0.85;
        spotX.save();
        spotX.globalAlpha = ka;
        spotX.font = (fs * 0.22) + 'px "Noto Serif KR"';
        spotX.fillStyle = '#C9A84C';
        spotX.textAlign = 'center';
        spotX.shadowColor = 'rgba(201,168,76,0.55)';
        spotX.shadowBlur = 12 * ka;
        spotX.fillText('아  리  스  김', spotCvs.width / 2, ty + fs * 0.37);
        spotX.restore();
      }

      if(p < 1){
        requestAnimationFrame(frame);
      } else {
        setTimeout(function(){
          crackOn=false;
          crackX.clearRect(0,0,crackCvs.width,crackCvs.height);
          done();
        }, 2500);
      }
    }
    requestAnimationFrame(frame);
  });
}

/* ─── MAIN FLOW ─── */
var params = new URLSearchParams(window.location.search);
var skipToEnd = params.get('skip') === '1';

if(skipToEnd){
  enterGate.classList.add('gone');
  videoIntro.classList.add('done');
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'none';
  document.getElementById('phase3').classList.add('show');
} else {

  // Wait for ENTER click — this enables sound autoplay
  enterGate.addEventListener('click', function(){
    enterGate.classList.add('gone');
    setTimeout(function(){ enterGate.style.display='none'; }, 1000);

    // Init audio (user gesture enables it)
    initAudio();
    if(AC && AC.state === 'suspended') AC.resume();

    // Play video WITH sound
    introVideo.play();

    // Spotlight turns on at 1s
    setTimeout(function(){
      spotlight.classList.add('on');
      spotlightSrc.classList.add('on');
      spotlightPool.classList.add('on');
    }, 1000);

    // Typewriter subtitle at 1.2s — two lines
    var subtitleEl = document.getElementById('introSubtitle');
    var line1 = '재능은 많은데';
    var line2 = '머리가 비었어!';
    var charIndex = 0;
    var fullText = line1;
    setTimeout(function(){
      var typeInterval = setInterval(function(){
        if(charIndex < fullText.length){
          subtitleEl.textContent = fullText.substring(0, charIndex + 1);
          charIndex++;
        } else {
          clearInterval(typeInterval);
          // After line 1, start line 2
          if(fullText === line1){
            setTimeout(function(){
              charIndex = 0;
              fullText = line2;
              var typeInterval2 = setInterval(function(){
                if(charIndex < fullText.length){
                  subtitleEl.textContent = line1 + '\n' + fullText.substring(0, charIndex + 1);
                  charIndex++;
                } else {
                  clearInterval(typeInterval2);
                  setTimeout(function(){ subtitleEl.classList.add('done-typing'); }, 800);
                }
              }, 60);
            }, 400);
          }
        }
      }, 60);
    }, 1200);

    // Start spotlight 0.5s before video ends (overlap transition)
    var spotlightStarted = false;
    introVideo.ontimeupdate = function(){
      if(spotlightStarted) return;
      if(introVideo.duration - introVideo.currentTime <= 0.5){
        spotlightStarted = true;
        videoIntro.classList.add('fade');
        setTimeout(function(){ videoIntro.classList.add('done'); }, 1500);
        runSpotlightBeam(function(){
        // Spotlight beam done → fade out Phase 1
        document.getElementById('phase1').classList.add('fade-out');

        // Phase 2 show
        setTimeout(function(){
          document.getElementById('phase2').classList.add('show');
        }, 500);

        // Phase 2 fade-out
        setTimeout(function(){
          document.getElementById('phase2').classList.add('fade-out');
        }, 3000);

        // Phase 3 show
        setTimeout(function(){
          document.getElementById('phase3').classList.add('show');
        }, 3500);
      });
      }
    };
  });
}

  if(e.key === 'ArrowLeft') window.location.href = 'story.html';
  if(e.key === 'ArrowRight') window.location.href = 'booking.html';
});
