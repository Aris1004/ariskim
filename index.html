<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS KIM | 아리스김</title>
<meta property="og:type" content="website">
<meta property="og:title" content="ARIS KIM | 아리스김">
<meta property="og:description" content="뉴욕 카네기홀 · 예술의전당 최초 1호 아티스트 · 아시아 탱고 챔피언">
<meta property="og:image" content="https://ariskim.netlify.app/og_sign.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A84C;--bg:#0A0908;--text:#F2EDE4;--gold-subtle:rgba(201,168,76,0.3);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;}
a,a:link,a:visited{color:var(--text);text-decoration:none;-webkit-tap-highlight-color:transparent;}
a:hover,a:active{color:var(--text);}

/* ═══════════════════════════════════════
   VIDEO INTRO + SPOTLIGHT
   ═══════════════════════════════════════ */
#videoIntro{
  position:fixed;inset:0;z-index:99999;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#videoIntro.fade{animation:introFade 1.5s ease forwards;}
#videoIntro.done{display:none;}

#introVideo{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.8s ease;
}
#introVideo.visible{opacity:1;}

/* Spotlight cone from top */
.spotlight{
  position:absolute;
  top:-10%;left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-top:110vh solid rgba(255,245,200,0.06);
  opacity:0;
  filter:blur(30px);
  pointer-events:none;
  z-index:2;
  will-change:opacity;
}
.spotlight.on{
  animation:spotlightOn 2s ease forwards;
}
@keyframes spotlightOn{
  0%{opacity:0;transform:translateX(-50%) scaleX(0.3);}
  40%{opacity:1;transform:translateX(-50%) scaleX(0.6);}
  100%{opacity:1;transform:translateX(-50%) scaleX(1);}
}

/* Spotlight glow at top */
.spotlight-source{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:8px;height:8px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(255,245,200,0.5),transparent);
  box-shadow:0 0 30px rgba(255,245,200,0.6),0 0 60px rgba(201,168,76,0.3);
  opacity:0;
  z-index:3;
  will-change:opacity;
}
.spotlight-source.on{
  animation:sourceOn 1.5s ease forwards;
}
@keyframes sourceOn{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0.8;}
}

/* Circular spotlight pool on the floor */
.spotlight-pool{
  position:absolute;
  bottom:15%;left:50%;
  transform:translateX(-50%);
  width:300px;height:80px;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,245,200,0.12) 0%,rgba(201,168,76,0.05) 40%,transparent 70%);
  filter:blur(20px);
  opacity:0;
  z-index:2;
  will-change:opacity;
}
.spotlight-pool.on{
  animation:poolOn 2s ease 0.5s forwards;
}
@keyframes poolOn{
  0%{opacity:0;}
  100%{opacity:1;}
}

/* Dark vignette over video */
.video-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 50% at center,transparent 0%,rgba(0,0,0,0.7) 100%);
  z-index:1;
  pointer-events:none;
}

@keyframes introFade{
  0%{opacity:1;}
  100%{opacity:0;pointer-events:none;}
}

/* ═══════════════════════════════════════
   PHASE 1: THE VOID
   ═══════════════════════════════════════ */
#phase1{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
#phase1.fade-out{opacity:0;pointer-events:none;}

#phase1-container{
  position:relative;
  width:90vw;max-width:900px;height:300px;
  text-align:center;
}

#sig-kr-top{
  position:absolute;top:calc(50% - 60px);left:50%;
  transform:translateX(-50%);white-space:nowrap;
  font-family:'Noto Serif KR',serif;font-size:clamp(11px,1.4vw,15px);
  font-weight:200;letter-spacing:0.35em;
  color:rgba(201,168,76,0.7);
  opacity:0;
  animation:revealName 1.2s ease 0.8s forwards;
}
#sig-line{
  position:absolute;top:calc(50% - 10px);left:50%;
  transform:translateX(-50%);
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:expandLine 1.5s ease 1.2s forwards;
}
#sig-en{
  position:absolute;top:calc(50% + 20px);left:50%;
  transform:translateX(-50%) scale(0.92);white-space:nowrap;
  font-family:'Cinzel',serif;font-size:clamp(28px,5vw,72px);
  font-weight:900;letter-spacing:0.12em;
  color:var(--text);
  text-shadow:0 0 40px rgba(201,168,76,0.3);
  opacity:0;
  animation:revealName 1.4s ease 1.6s forwards;
}
#sig-kr-bottom{
  position:absolute;top:calc(50% + 100px);left:50%;
  transform:translateX(-50%);white-space:nowrap;
  font-family:'Noto Serif KR',serif;font-size:clamp(10px,1.2vw,14px);
  font-weight:200;letter-spacing:0.6em;
  color:rgba(201,168,76,0.4);
  opacity:0;
  animation:revealName 1s ease 2.2s forwards;
}

@keyframes revealName{
  0%{opacity:0;transform:translateX(-50%) translateY(8px);}
  100%{opacity:1;transform:translateX(-50%) translateY(0);}
}
@keyframes expandLine{
  0%{width:0;}
  100%{width:min(300px,60vw);}
}

/* ═══════════════════════════════════════
   PHASE 2: THE REVELATION
   ═══════════════════════════════════════ */
#phase2{
  position:fixed;inset:0;z-index:200;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase2.show{opacity:1;}
#phase2.fade-out{opacity:0;transition:opacity 1s ease;}

#void-left,#void-right{
  position:absolute;top:0;width:50%;height:100%;
  background:var(--bg);z-index:2;
  transition:transform 1.8s cubic-bezier(0.77,0,0.18,1);
}
#void-left{left:0;}
#void-right{right:0;}
#phase2.show #void-left{transform:translateX(-100%);}
#phase2.show #void-right{transform:translateX(100%);}

#hero-image{
  position:absolute;inset:0;
  background:url('images/screw_photo.jpg') center/cover no-repeat;
  filter:brightness(0.6);
  animation:kenBurns 12s ease-in-out infinite alternate;
}
@keyframes kenBurns{
  0%{transform:scale(1);}
  100%{transform:scale(1.08);}
}

#hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.4) 0%,rgba(10,9,8,0.1) 40%,rgba(10,9,8,0.6) 100%);
  z-index:1;
}

#phase2-content{
  position:absolute;bottom:12%;left:0;right:0;
  text-align:center;z-index:3;
  opacity:0;
  animation:fadeUp 1.2s ease 2s forwards;
}
#p2-tag{
  font-family:'Cinzel',serif;font-size:clamp(7px,0.9vw,10px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
#p2-kr-top{
  font-family:'Noto Serif KR',serif;font-size:clamp(10px,1.2vw,14px);
  font-weight:200;letter-spacing:0.25em;
  color:rgba(242,237,228,0.7);
}

@keyframes fadeUp{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* ═══════════════════════════════════════
   PHASE 3: THE PORTAL — Gold Frame Cards
   ═══════════════════════════════════════ */
#phase3{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(20px,3vw,60px);
  padding:clamp(20px,4vh,60px) clamp(20px,4vw,80px);
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#phase3.show{opacity:1;pointer-events:auto;}

/* Golden floating particles */
.golden-dust{
  position:fixed;border-radius:50%;pointer-events:none;z-index:101;
  background:radial-gradient(circle,rgba(201,168,76,0.6),transparent);
  opacity:0;
}
#phase3.show ~ .golden-dust{opacity:1;}
.dust-1{width:3px;height:3px;top:18%;left:12%;animation:floatDust 8s ease-in-out infinite;}
.dust-2{width:2px;height:2px;top:72%;left:8%;animation:floatDust 11s ease-in-out 1s infinite;}
.dust-3{width:4px;height:4px;top:35%;right:15%;animation:floatDust 9s ease-in-out 2s infinite;}
.dust-4{width:2px;height:2px;top:60%;right:10%;animation:floatDust 10s ease-in-out 0.5s infinite;}
.dust-5{width:3px;height:3px;top:85%;left:45%;animation:floatDust 12s ease-in-out 3s infinite;}
.dust-6{width:2px;height:2px;top:15%;right:40%;animation:floatDust 7s ease-in-out 1.5s infinite;}

@keyframes floatDust{
  0%,100%{transform:translateY(0) translateX(0);opacity:0.3;}
  25%{transform:translateY(-20px) translateX(10px);opacity:0.7;}
  50%{transform:translateY(-8px) translateX(-8px);opacity:0.5;}
  75%{transform:translateY(-25px) translateX(5px);opacity:0.8;}
}

/* Card — gold framed photo card */
.card{
  position:relative;flex:1;max-width:520px;
  height:clamp(400px,75vh,800px);
  border:1.5px solid rgba(201,168,76,0.55);
  overflow:hidden;cursor:pointer;
  text-decoration:none;display:block;
  transition:transform 0.6s ease,box-shadow 0.6s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(201,168,76,0.15),0 0 80px rgba(201,168,76,0.08);
}

.card-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:brightness(0.65);
  transition:filter 0.7s,transform 0.7s;
}
.card:hover .card-img{filter:brightness(0.8);transform:scale(1.03);}
#card-story .card-img{background-image:url('images/hero_led_stage.jpg');}
#card-booking .card-img{background-image:url('images/hero_a5_klimt_led.jpg');}

.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,9,8,0.2) 0%,rgba(10,9,8,0.05) 30%,rgba(10,9,8,0.55) 100%);
  z-index:1;
}

.card-content{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
}

.card-discover{
  font-family:'Cinzel',serif;font-size:clamp(8px,1vw,11px);
  letter-spacing:0.5em;color:var(--gold);opacity:0.6;
  margin-bottom:16px;
}
.card-title{
  font-family:'Cinzel',serif;font-size:clamp(28px,4vw,56px);
  font-weight:900;letter-spacing:0.1em;
  color:var(--text);margin-bottom:12px;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.card-kr{
  font-family:'Noto Serif KR',serif;font-size:clamp(11px,1.2vw,15px);
  font-weight:200;letter-spacing:0.3em;
  color:rgba(242,237,228,0.5);margin-bottom:28px;
}
.card-cta{
  display:inline-block;font-family:'Cinzel',serif;
  font-size:clamp(10px,1vw,13px);font-weight:400;
  letter-spacing:0.3em;padding:14px 36px;
  border:1px solid rgba(242,237,228,0.3);
  color:rgba(242,237,228,0.8);
  transition:all 0.35s;
}
.card-cta:hover{
  background:rgba(201,168,76,0.15);
  border-color:var(--gold);color:var(--text);
}

/* Golden corner accents inside card */
.card::before,.card::after{
  content:'';position:absolute;width:20px;height:20px;
  z-index:3;opacity:0.4;transition:opacity 0.4s;
}
.card:hover::before,.card:hover::after{opacity:0.8;}
.card::before{bottom:16px;left:16px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.card::after{bottom:16px;right:16px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

/* Signature */
#sig{
  position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
  z-index:999;font-family:'Cinzel',serif;font-size:7px;
  letter-spacing:0.5em;color:rgba(201,168,76,0.12);
  white-space:nowrap;pointer-events:none;
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */

/* Tablet */
@media(min-width:769px) and (max-width:1024px){
  .card{max-width:420px;}
  .card-title{font-size:clamp(24px,3.5vw,40px);}
}

/* Small tablet / large phone landscape */
@media(min-width:481px) and (max-width:768px){
  #phase3{flex-direction:row;gap:16px;padding:20px;}
  .card{max-width:none;height:clamp(350px,70vh,600px);}
  .card-title{font-size:clamp(20px,3vw,32px);}
  .card-kr{font-size:10px;}
  .card-discover{font-size:8px;}
  .card-cta{padding:10px 24px;font-size:9px;}
}

/* Phone */
@media(max-width:480px){
  html,body{overflow-y:auto!important;overflow-x:hidden!important;}
  #phase3{
    position:relative!important;
    flex-direction:column;gap:16px;
    padding:16px;min-height:100vh;
    align-items:stretch;
  }
  .card{flex:none;max-width:none;height:clamp(300px,45vh,500px);}
  .card-title{font-size:clamp(24px,7vw,36px);}
  .card-kr{font-size:11px;}
  .card-cta{padding:12px 28px;font-size:10px;}
  #sig{display:none;}
}

/* Galaxy Z Fold5 unfolded & square-ish tablet */
@media(min-width:481px) and (max-width:900px) and (min-aspect-ratio:3/4) and (max-aspect-ratio:5/4){
  html,body{overflow-y:auto!important;overflow-x:hidden!important;}
  #phase3{
    position:relative!important;
    flex-direction:column!important;gap:20px;
    padding:24px;min-height:100vh;
    align-items:stretch;
  }
  .card{flex:none;max-width:none;height:clamp(320px,42vh,480px);}
  .card-title{font-size:clamp(26px,5vw,42px);}
  .card-kr{font-size:12px;}
  .card-cta{padding:14px 32px;font-size:11px;}
}
</style>
</head>
<body>

<!-- VIDEO INTRO + SPOTLIGHT -->
<div id="videoIntro">
  <video id="introVideo" muted playsinline preload="auto">
    <source src="영상/스님.mp4" type="video/mp4">
  </video>
  <div class="video-vignette"></div>
  <div class="spotlight" id="spotlight"></div>
  <div class="spotlight-source" id="spotlightSrc"></div>
  <div class="spotlight-pool" id="spotlightPool"></div>
</div>

<!-- PHASE 1: THE VOID -->
<div id="phase1">
  <div id="phase1-container">
    <div id="sig-kr-top">머리가 비어야 할 수 있었던 것</div>
    <div id="sig-line"></div>
    <div id="sig-en">ARIS KIM</div>
    <div id="sig-kr-bottom">아 리 스 김</div>
  </div>
</div>

<!-- PHASE 2: THE REVELATION -->
<div id="phase2">
  <div id="void-left"></div>
  <div id="void-right"></div>
  <div id="hero-image"></div>
  <div id="hero-overlay"></div>
  <div id="phase2-content">
    <div id="p2-tag">SAXOPHONE · MEDIA ART · TANGO</div>
    <div id="p2-kr-top">뉴욕 카네기홀 · 예술의전당 최초 1호 · 아시아 탱고 챔피언</div>
  </div>
</div>

<!-- PHASE 3: THE PORTAL — Gold Frame Cards -->
<div id="phase3">
  <a class="card" id="card-story" href="story.html">
    <div class="card-img"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <span class="card-discover">D I S C O V E R</span>
      <h1 class="card-title">STORY</h1>
      <p class="card-kr">삶의 음악</p>
      <div class="card-cta">여정</div>
    </div>
  </a>
  <a class="card" id="card-booking" href="booking.html">
    <div class="card-img"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <span class="card-discover">D I S C O V E R</span>
      <h1 class="card-title">ARISHOW</h1>
      <p class="card-kr">CONCERT</p>
      <div class="card-cta">공연기획</div>
    </div>
  </a>
</div>

<!-- Golden floating particles -->
<div class="golden-dust dust-1"></div>
<div class="golden-dust dust-2"></div>
<div class="golden-dust dust-3"></div>
<div class="golden-dust dust-4"></div>
<div class="golden-dust dust-5"></div>
<div class="golden-dust dust-6"></div>

<div id="sig">ARISHOW COMPANY · ARIS KIM</div>

<script>
/* ═══════════════════════════════════════
   ARIS KIM — THE PORTAL — INDEX
   Video Intro + Spotlight + Phases
   ═══════════════════════════════════════ */

var videoIntro = document.getElementById('videoIntro');
var introVideo = document.getElementById('introVideo');
var spotlight = document.getElementById('spotlight');
var spotlightSrc = document.getElementById('spotlightSrc');
var spotlightPool = document.getElementById('spotlightPool');

// Check for skip parameter
var params = new URLSearchParams(window.location.search);
var skipToEnd = params.get('skip') === '1';

if(skipToEnd){
  videoIntro.classList.add('done');
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'none';
  document.getElementById('phase3').classList.add('show');
} else {

  // Start video autoplay
  introVideo.play().then(function(){
    introVideo.classList.add('visible');
  }).catch(function(){
    // Autoplay blocked — show video anyway
    introVideo.classList.add('visible');
  });

  // Spotlight turns on at 1s
  setTimeout(function(){
    spotlight.classList.add('on');
    spotlightSrc.classList.add('on');
    spotlightPool.classList.add('on');
  }, 1000);

  // Video intro fades out at 4s
  setTimeout(function(){
    videoIntro.classList.add('fade');
  }, 4000);
  setTimeout(function(){
    videoIntro.classList.add('done');
    introVideo.pause();
  }, 5500);

  // Phase 1 fade-out at 9s (문구 충분히 보여준 후)
  setTimeout(function(){
    document.getElementById('phase1').classList.add('fade-out');
  }, 9000);

  // Phase 2 show at 9.5s (사진 등장)
  setTimeout(function(){
    document.getElementById('phase2').classList.add('show');
  }, 9500);

  // Phase 2 fade-out at 12s (사진 2.5초간 유지)
  setTimeout(function(){
    document.getElementById('phase2').classList.add('fade-out');
  }, 12000);

  // Phase 3 show at 12.5s
  setTimeout(function(){
    document.getElementById('phase3').classList.add('show');
  }, 12500);
}

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowLeft') window.location.href = 'story.html';
  if(e.key === 'ArrowRight') window.location.href = 'booking.html';
});
</script>
</body>
</html>
