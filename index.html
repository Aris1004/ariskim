<script>
/* ══════════════════════════════════
   WEB AUDIO ENGINE — LUXURY CINEMATIC
══════════════════════════════════ */
let AC = null;
function initAudio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); }

/* 공용 리버브 생성 (공간감의 핵심) */
function makeReverb(duration=3.5, decay=2.5){
  const len = AC.sampleRate * duration;
  const buf = AC.createBuffer(2, len, AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  const rv=AC.createConvolver(); rv.buffer=buf;
  return rv;
}

/* 1. 긴장감 빌드업 드론
   — 빔 등장 전, 거의 들릴 듯 말 듯한 저음이 공간을 채움 */
function playTensionDrone(duration=3.2){
  if(!AC) return;
  const t=AC.currentTime;
  [61.7, 92.5].forEach((freq,i)=>{          // B1, F#2 (완전5도 불협)
    const osc=AC.createOscillator();
    osc.type='sine'; osc.frequency.value=freq;
    const g=AC.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.06-i*0.02, t+duration*0.7);
    g.gain.linearRampToValueAtTime(0.12-i*0.03, t+duration);
    g.gain.linearRampToValueAtTime(0, t+duration+0.5);
    const rv=makeReverb(4,2);
    const rvG=AC.createGain(); rvG.gain.value=0.5;
    osc.connect(g); g.connect(AC.destination);
    osc.connect(rv); rv.connect(rvG); rvG.connect(AC.destination);
    osc.start(t); osc.stop(t+duration+1);
  });
}

/* 2. 황금빛 오케스트라 스웰
   — 빔이 서명을 비추는 순간, E장조 화음이 천천히 피어오름 */
function playGoldenOrchestralSwell(delay=0){
  if(!AC) return;
  const t=AC.currentTime+delay;
  // E장조 분산화음: E1, B1, E2, G#2, B2, E3
  const chord=[41.2, 61.7, 82.4, 103.8, 123.5, 164.8];
  const rv=makeReverb(5,1.8);
  const rvG=AC.createGain(); rvG.gain.value=0.6; rv.connect(rvG); rvG.connect(AC.destination);

  chord.forEach((freq,i)=>{
    const osc=AC.createOscillator();
    osc.type='triangle';
    osc.frequency.setValueAtTime(freq*0.95, t+i*0.12);
    osc.frequency.linearRampToValueAtTime(freq, t+i*0.12+0.8);
    const g=AC.createGain();
    const startVol=0.18-i*0.02;
    g.gain.setValueAtTime(0, t+i*0.12);
    g.gain.linearRampToValueAtTime(startVol, t+i*0.12+0.9);  // 느린 어택
    g.gain.linearRampToValueAtTime(startVol*1.2, t+1.8);
    g.gain.linearRampToValueAtTime(0, t+3.5);
    osc.connect(g); g.connect(AC.destination);
    osc.connect(rv);
    osc.start(t+i*0.12); osc.stop(t+4.5);
  });
}

/* 3. 크리스탈 벨 (서명이 완전히 드러나는 순간)
   — 순수한 사인파, 매우 긴 감쇠 — 유리잔 소리처럼 맑고 고급스러움 */
function playCrystalBell(delay=0){
  if(!AC) return;
  const t=AC.currentTime+delay;
  const rv=makeReverb(6,1.2);
  const rvG=AC.createGain(); rvG.gain.value=0.7; rv.connect(rvG); rvG.connect(AC.destination);

  [528, 1056, 1584].forEach((freq,i)=>{ // 528Hz 기본음 + 배음
    const osc=AC.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
    const g=AC.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22-i*0.07, t+0.01); // 즉각적 어택
    g.gain.exponentialRampToValueAtTime(0.001, t+5.0);   // 매우 긴 감쇠
    osc.connect(g); g.connect(AC.destination);
    osc.connect(rv);
    osc.start(t); osc.stop(t+5.5);
  });
}

/* 4. 시네마틱 서브베이스 붐 (지진 임팩트)
   — 디스토션 없음, 순수 사인파 — 영화관 저음처럼 가슴을 울림 */
function playCinematicBoom(delay=0){
  if(!AC) return;
  const t=AC.currentTime+delay;

  // 서브베이스 (35Hz → 18Hz, 피치 다운)
  const sub=AC.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(38, t);
  sub.frequency.exponentialRampToValueAtTime(18, t+2.0);
  const subG=AC.createGain();
  subG.gain.setValueAtTime(0, t);
  subG.gain.linearRampToValueAtTime(3.5, t+0.008); // 극도로 빠른 어택
  subG.gain.exponentialRampToValueAtTime(0.001, t+2.5);
  sub.connect(subG); subG.connect(AC.destination);
  sub.start(t); sub.stop(t+3);

  // 중저음 보강 (65Hz, 깊이 추가)
  const mid=AC.createOscillator(); mid.type='sine';
  mid.frequency.setValueAtTime(65, t);
  mid.frequency.exponentialRampToValueAtTime(35, t+1.5);
  const midG=AC.createGain();
  midG.gain.setValueAtTime(0,t);
  midG.gain.linearRampToValueAtTime(1.8, t+0.012);
  midG.gain.exponentialRampToValueAtTime(0.001, t+2.0);
  const rv=makeReverb(3,2.0);
  const rvG=AC.createGain(); rvG.gain.value=0.4; rv.connect(rvG); rvG.connect(AC.destination);
  mid.connect(midG); midG.connect(AC.destination);
  mid.connect(rv);
  mid.start(t); mid.stop(t+2.5);
}

/* 5. 지진 럼블 (저주파 노이즈, 매우 낮은 주파수만 통과)
   — 50Hz 이하만 허용 → 광원처럼 느껴지지 않고 물리적 진동감 */
function playSeismicRumble(delay=0, duration=3.5){
  if(!AC) return;
  const t=AC.currentTime+delay;
  const buf=AC.createBuffer(1, AC.sampleRate*duration, AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource(); src.buffer=buf;

  // 매우 낮은 로우패스 (50Hz 이하만)
  const lp1=AC.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=50; lp1.Q.value=2;
  const lp2=AC.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=35; lp2.Q.value=1;

  const g=AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(1.8,t+0.3);
  g.gain.setValueAtTime(2.2,t+0.8);
  g.gain.linearRampToValueAtTime(0,t+duration);

  const rv=makeReverb(2.5,2.0);
  const rvG=AC.createGain(); rvG.gain.value=0.3; rv.connect(rvG); rvG.connect(AC.destination);

  src.connect(lp1); lp1.connect(lp2); lp2.connect(g);
  g.connect(AC.destination); g.connect(rv);
  src.start(t);
}

/* ══════════════════════════════════
   CANVAS SETUP
══════════════════════════════════ */
const C=document.getElementById('cvs'), X=C.getContext('2d');
const CC=document.getElementById('crack-cvs'), CX=CC.getContext('2d');
function resize(){ C.width=innerWidth; C.height=innerHeight; CC.width=innerWidth; CC.height=innerHeight; }
resize(); addEventListener('resize',resize);

/* ══════════════════════════════════
   CRACK & DEBRIS SYSTEM
══════════════════════════════════ */
const cracks=[], debris=[];

function addCrack(x,y,ang,len,depth){
  if(depth<=0||len<10) return;
  const ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
  cracks.push({x1:x,y1:y,x2:ex,y2:ey,a:0,maxA:0.5+Math.random()*0.35});
  const br=depth>1?(Math.random()<0.65?2:1):1;
  for(let i=0;i<br;i++) addCrack(ex,ey,ang+(Math.random()-.5)*1.3,len*(0.45+Math.random()*0.35),depth-1);
}

function spawnDebris(cx,cy,n){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    debris.push({x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*80,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
      sz:1.5+Math.random()*3.5, a:0.9, rot:Math.random()*Math.PI*2,
      rv:(Math.random()-.5)*0.3, life:1, decay:0.014+Math.random()*0.016});
  }
}

function buildCracks(){
  cracks.length=0; debris.length=0;
  const cx=CC.width*0.5, cy=CC.height*0.51;
  for(let i=0;i<9;i++){
    const ang=(i/9)*Math.PI*2+(Math.random()-.5)*0.4;
    addCrack(cx,cy,ang,CC.width*(0.20+Math.random()*0.28),4);
  }
  for(let i=0;i<4;i++){
    const ang=Math.random()*Math.PI*2;
    addCrack(cx+(Math.random()-.5)*200, cy+(Math.random()-.5)*150, ang, CC.width*0.18, 3);
  }
  spawnDebris(cx,cy,80);
  spawnDebris(cx*0.25,cy*0.75,25);
  spawnDebris(cx*1.75,cy*1.1,25);
}

let crackOn=false;
function drawCracks(){
  if(!crackOn) return;
  CX.clearRect(0,0,CC.width,CC.height);
  cracks.forEach(cr=>{
    cr.a=Math.min(cr.a+0.055,cr.maxA);
    CX.beginPath(); CX.moveTo(cr.x1,cr.y1); CX.lineTo(cr.x2,cr.y2);
    CX.strokeStyle=`rgba(255,210,100,${cr.a})`;
    CX.lineWidth=0.7+cr.a*1.2;
    CX.shadowColor=`rgba(255,190,60,${cr.a*0.7})`; CX.shadowBlur=5;
    CX.stroke(); CX.shadowBlur=0;
  });
  debris.forEach(d=>{
    if(d.life<=0) return;
    d.x+=d.vx; d.y+=d.vy; d.vy+=0.14; d.vx*=0.97; d.rot+=d.rv;
    d.life-=d.decay; d.a=Math.max(0,d.life*0.9);
    CX.save(); CX.translate(d.x,d.y); CX.rotate(d.rot);
    CX.fillStyle=`rgba(210,170,70,${d.a})`;
    CX.fillRect(-d.sz/2,-d.sz/2,d.sz,d.sz); CX.restore();
  });
  requestAnimationFrame(drawCracks);
}

/* ══════════════════════════════════
   SCREEN SHAKE
══════════════════════════════════ */
function shake(dur,amp){
  const el=document.getElementById('s1');
  const t0=performance.now();
  (function loop(){
    const p=Math.max(0,1-(performance.now()-t0)/dur);
    if(p<=0){el.style.transform='translate(0,0)';return;}
    el.style.transform=`translate(${(Math.random()-.5)*amp*p*2}px,${(Math.random()-.5)*amp*p*2}px)`;
    requestAnimationFrame(loop);
  })();
}

/* ══════════════════════════════════
   FLASH
══════════════════════════════════ */
function doFlash(col='#fff',a=0.85,dur=70){
  const f=document.getElementById('flash');
  f.style.background=col; f.style.opacity=a; f.style.transition='none';
  setTimeout(()=>{f.style.transition=`opacity ${dur}ms ease`; f.style.opacity=0;},25);
}

/* ══════════════════════════════════
   PHASE 1: 스포트라이트 + 지진
══════════════════════════════════ */
function phase1(done){
  document.fonts.load('140px "Herr Von Muellerhoff"').then(()=>{
    const txt='Aris Kim';
    const fs=Math.min(innerWidth*.13,152);
    X.font=`${fs}px "Herr Von Muellerhoff"`;
    const tw=X.measureText(txt).width;
    const tx=(C.width-tw)/2, ty=C.height*.50;

    /* 오디오는 tryResumeAudio에서 타이밍에 맞게 자동 처리 */

    /* 지진 효과는 서명 등장 이후(3.5s)에 발생 */
    setTimeout(()=>{
      buildCracks(); crackOn=true; drawCracks();
      shake(2000, 13);
      setTimeout(()=>shake(600,6), 900);
      setTimeout(()=>shake(300,3), 1600);
      doFlash('#fff',0.75,55);
      setTimeout(()=>doFlash('#ffaa00',0.3,150), 400);
      setTimeout(()=>doFlash('#fff',0.18,120), 900);
    }, 3500);

    let t0=null; const dur=3200;
    function frame(ts){
      if(!t0) t0=ts;
      const p=Math.min((ts-t0)/dur,1);
      const e=p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;

      X.fillStyle='#040302'; X.fillRect(0,0,C.width,C.height);

      /* 스포트라이트 빔 */
      if(e>0.04){
        const ba=Math.min(e*1.6,0.9);
        const cx=C.width*.5, sp=C.width*0.28*Math.min(e*1.4,1);
        X.save(); X.beginPath(); X.moveTo(cx,0);
        X.lineTo(cx-sp,C.height); X.lineTo(cx+sp,C.height); X.closePath();
        const bg=X.createLinearGradient(cx,0,cx,C.height);
        bg.addColorStop(0,`rgba(255,230,150,${ba*.26})`);
        bg.addColorStop(.25,`rgba(232,204,122,${ba*.13})`);
        bg.addColorStop(.55,`rgba(201,168,76,${ba*.07})`);
        bg.addColorStop(1,'rgba(201,168,76,0)');
        X.fillStyle=bg; X.fill(); X.restore();
        const sg=X.createRadialGradient(cx,0,0,cx,0,85);
        sg.addColorStop(0,`rgba(255,240,170,${ba*.55})`);
        sg.addColorStop(.4,`rgba(232,204,122,${ba*.2})`);
        sg.addColorStop(1,'rgba(201,168,76,0)');
        X.beginPath(); X.arc(cx,0,85,0,Math.PI*2); X.fillStyle=sg; X.fill();
      }

      /* 서명 */
      if(e>0.35){
        const sa=Math.min((e-.35)/.45,1);
        X.save(); X.globalAlpha=sa;
        X.font=`${fs}px "Herr Von Muellerhoff"`;
        X.fillStyle='#EDE4D6';
        X.shadowColor='rgba(232,204,122,.65)'; X.shadowBlur=20*sa;
        X.fillText(txt,tx,ty); X.restore();
      }

      /* 한글 */
      if(e>0.65){
        const ka=Math.min((e-.65)/.28,1)*0.85;
        X.save(); X.globalAlpha=ka;
        X.font=`${fs*.22}px "Cinzel"`;
        X.fillStyle='#C9A84C'; X.textAlign='center';
        X.shadowColor='rgba(201,168,76,.55)'; X.shadowBlur=12*ka;
        X.fillText('아  리  스  김',C.width/2,ty+fs*.37);
        X.restore();
      }

      if(p<1){ requestAnimationFrame(frame); }
      else { setTimeout(()=>{ crackOn=false; CX.clearRect(0,0,CC.width,CC.height); done(); }, 2500); }
    }
    requestAnimationFrame(frame);
  });
}

/* ══════════════════════════════════
   PHASE 2 & 3
══════════════════════════════════ */
function phase2(done){
  document.getElementById('s1').classList.add('out');
  setTimeout(()=>{
    document.getElementById('s1').style.display='none';
    document.getElementById('s2').classList.add('show');
    setTimeout(done,1900);
  },1400);
}
function phase3(){
  const s2=document.getElementById('s2');
  s2.classList.add('out');
  setTimeout(()=>{s2.style.display='none'; document.getElementById('dl').classList.add('show');},1000);
  setTimeout(()=>{document.getElementById('pa').classList.add('open'); document.getElementById('pb').classList.add('open');},1200);
}

/* ══════════════════════════════════
   자동 오디오 — 첫 인터랙션 시 resume
══════════════════════════════════ */
let audioResumed = false;
let audioStartTime = null;

function tryResumeAudio(){
  if(audioResumed || !AC) return;
  AC.resume().then(()=>{
    audioResumed = true;
    const elapsed = audioStartTime ? (performance.now() - audioStartTime) / 1000 : 0;
    // Phase A: 서명 구간 (0 ~ 3.2s) — 긴장감 드론 + 오케스트라 스웰 + 크리스탈 벨
    if(elapsed < 0.3)  playTensionDrone(3.2 - elapsed);
    if(elapsed < 1.4)  playGoldenOrchestralSwell(Math.max(0, 1.2 - elapsed));
    if(elapsed < 3.2)  playCrystalBell(Math.max(0, 2.8 - elapsed));
    // Phase B: 지진 구간 (3.5s ~) — 서브베이스 붐 + 럼블
    if(elapsed < 3.8)  playCinematicBoom(Math.max(0, 3.5 - elapsed));
    if(elapsed < 4.0)  playSeismicRumble(Math.max(0, 3.6 - elapsed), 3.0);
  });
  ['mousemove','touchstart','scroll','keydown','click'].forEach(ev=>{
    document.removeEventListener(ev, tryResumeAudio);
  });
}

// 페이지 로드 즉시 AudioContext 생성 (suspended)
initAudio();
// 어떤 인터랙션이든 첫 번째에 resume
['mousemove','touchstart','scroll','keydown','click'].forEach(ev=>{
  document.addEventListener(ev, tryResumeAudio, {passive:true, once:false});
});

// 시각 애니메이션은 즉시 시작
const skip=new URLSearchParams(location.search).get('skip');
if(skip==='1'){
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='none';
  document.getElementById('dl').classList.add('show');
  document.getElementById('pa').classList.add('open');
  document.getElementById('pb').classList.add('open');
} else {
  document.fonts.ready.then(()=>{
    setTimeout(()=>{
      audioStartTime = performance.now(); // 애니메이션 시작 시각 기록
      phase1(()=>phase2(()=>phase3()));
    }, 400);
  });
}

/* 분리선 hover */
const dl=document.getElementById('dl'),pa=document.getElementById('pa'),pb=document.getElementById('pb');
dl.style.transition='left .75s cubic-bezier(.23,1,.32,1),opacity .9s ease';
pa.addEventListener('mouseenter',()=>dl.style.left='58%');
pa.addEventListener('mouseleave',()=>dl.style.left='50%');
pb.addEventListener('mouseenter',()=>dl.style.left='42%');
pb.addEventListener('mouseleave',()=>dl.style.left='50%');
document.addEventListener('keydown',e=>{

/* ══════════════════════════════════
   LUXURY CLICK SOUND
   — 모든 링크·버튼 클릭 시 재생
   — 동일 스니펫을 booking.html / story.html 에도 추가 가능
══════════════════════════════════ */
function playClickSound(){
  if(!AC || AC.state !== 'running') return;
  const t = AC.currentTime;

  /* 리버브 (짧고 공간감 있는) */
  const rvBuf = AC.createBuffer(2, AC.sampleRate*0.8, AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=rvBuf.getChannelData(ch);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
  }
  const rv=AC.createConvolver(); rv.buffer=rvBuf;
  const rvG=AC.createGain(); rvG.gain.value=0.22;
  rv.connect(rvG); rvG.connect(AC.destination);

  /* 기본음: 880Hz (A5) — 고급 인터페이스 탭 느낌 */
  const a5=AC.createOscillator(); a5.type='sine'; a5.frequency.value=880;
  const a5g=AC.createGain();
  a5g.gain.setValueAtTime(0,t);
  a5g.gain.linearRampToValueAtTime(0.28, t+0.003); // 극도로 빠른 어택
  a5g.gain.exponentialRampToValueAtTime(0.001, t+0.18); // 우아한 감쇠
  a5.connect(a5g); a5g.connect(AC.destination);
  a5.connect(rv);
  a5.start(t); a5.stop(t+0.2);

  /* 배음: 1760Hz (A6) — 크리스탈 광택 */
  const a6=AC.createOscillator(); a6.type='sine'; a6.frequency.value=1760;
  const a6g=AC.createGain();
  a6g.gain.setValueAtTime(0,t);
  a6g.gain.linearRampToValueAtTime(0.10, t+0.002);
  a6g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  a6.connect(a6g); a6g.connect(AC.destination);
  a6.connect(rv);
  a6.start(t); a6.stop(t+0.14);

  /* 저음 보강: 220Hz — 묵직함 */
  const low=AC.createOscillator(); low.type='sine'; low.frequency.value=220;
  const lowG=AC.createGain();
  lowG.gain.setValueAtTime(0,t);
  lowG.gain.linearRampToValueAtTime(0.12, t+0.004);
  lowG.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  low.connect(lowG); lowG.connect(AC.destination);
  low.start(t); low.stop(t+0.1);
}

/* 모든 클릭에 적용 — a 태그와 button에 이벤트 위임 */
document.addEventListener('click', e => {
  const target = e.target.closest('a, button, .panel, .pcta');
  if(target) playClickSound();
}, true);
