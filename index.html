<style>
*{margin:0;padding:0;box-sizing:border-box;}
a,a:link,a:visited{color:rgba(242,237,228,.75);text-decoration:none;-webkit-tap-highlight-color:transparent;}
a:hover,a:active{color:rgba(242,237,228,.75);text-decoration:none;}
:root{--gold:#C9A84C;--gl:#E8CC7A;--bg:#040302;--w:#F2EDE4;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}

/* Enter screen 제거 — 자동 시작 */

/* ── PHASE 1 ── */
#s1{position:fixed;inset:0;z-index:300;background:var(--bg);transition:opacity 1.4s ease;}
#s1.out{opacity:0;pointer-events:none;}
#cvs{position:absolute;inset:0;width:100%;height:100%;}
#crack-cvs{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}

/* 섬광 레이어 */
#flash{position:fixed;inset:0;z-index:400;opacity:0;pointer-events:none;}

/* ── PHASE 2 ── */
#s2{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.4s ease;}
#s2.show{opacity:1;}
#s2.out{opacity:0;transition:opacity 1s ease;}
#photo-wrap{position:relative;width:clamp(280px,32vw,500px);height:80vh;overflow:hidden;border:1px solid rgba(201,168,76,.2);box-shadow:0 0 80px rgba(201,168,76,.15),0 0 200px rgba(201,168,76,.06);}
#photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:brightness(.88);}
#photo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(4,3,2,.7) 100%);}
#photo-name{position:absolute;bottom:28px;left:0;right:0;text-align:center;z-index:2;opacity:0;transition:opacity 1s ease .4s;}
#s2.show #photo-name{opacity:1;}
#photo-name .en{font-family:'Cinzel',serif;font-size:clamp(16px,2.2vw,28px);font-weight:900;letter-spacing:.22em;color:var(--w);text-shadow:0 0 30px rgba(201,168,76,.5);}
#photo-name .en .ai{color:var(--gold);}
#photo-name .kr{font-family:'Gowun Batang',serif;font-size:clamp(9px,1vw,12px);letter-spacing:.5em;color:rgba(232,204,122,.45);margin-top:8px;}

/* ── PHASE 3 ── */
#s3{position:fixed;inset:0;z-index:100;display:flex;}
.panel{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;overflow:hidden;cursor:pointer;transition:flex .85s cubic-bezier(.23,1,.32,1),transform 1.6s cubic-bezier(.77,0,.18,1);}
#pa{transform:translateX(-100%);}
#pb{transform:translateX(100%);}
#pa.open,#pb.open{transform:translateX(0);}
.panel:hover{flex:1.55;}
.pbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.22);transition:filter .7s,transform .7s;}
.panel:hover .pbg{filter:brightness(.4);transform:scale(1.04);}
#pa .pbg{background-image:url('images/img_black_jacket.jpg');background-position:center top;}
#pb .pbg{background-image:url('images/img_gold_jacket.jpg');background-position:center top;}
.pov{position:absolute;inset:0;}
#pa .pov{background:linear-gradient(145deg,rgba(4,3,2,.72) 0%,rgba(10,6,18,.32) 100%);}
#pb .pov{background:linear-gradient(145deg,rgba(16,9,2,.32) 0%,rgba(4,3,2,.78) 100%);}
.cor{position:absolute;width:14px;height:14px;opacity:.18;transition:opacity .45s;}
.panel:hover .cor{opacity:.55;}
.tl{top:20px;left:20px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.tr{top:20px;right:20px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}
.bl{bottom:20px;left:20px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}

.pc{position:relative;z-index:2;text-align:center;padding:48px 32px;transform:translateY(16px);opacity:.58;transition:transform .65s,opacity .65s;}
.panel:hover .pc{transform:translateY(0);opacity:1;}
.ptag{font-family:'Cinzel',serif;font-size:clamp(6px,.82vw,8px);letter-spacing:.52em;color:var(--gold);opacity:.45;display:block;margin-bottom:20px;}

#pb .pkr{color:rgba(232,204,122,.35);}

#pa .pcta:hover{background:rgba(236,228,216,.1);color:#fff;}

#dl.show{opacity:1;}
#dl::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:36px;height:36px;border:1px solid rgba(201,168,76,.36);border-radius:50%;background:var(--bg);}
#dl::after{content:'✦';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--gold);font-size:12px;z-index:1;}
.home-btn{display:inline-block;font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;letter-spacing:.3em;color:var(--gl);text-decoration:none;padding:10px 22px;background:rgba(8,6,3,.85);box-shadow:0 2px 10px rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.38);transition:all .3s;}
.home-btn:hover{border-color:var(--gold);color:#fff;transform:translateY(-1px);}
#sig{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:999;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.5em;color:rgba(201,168,76,.14);white-space:nowrap;pointer-events:none;}

@media(min-width:481px) and (max-width:768px){#s3{flex-direction:row;}.panel{flex:1;}.panel:hover{flex:1.4;}#dl{left:50%;top:0;width:1px;height:100%;}.pc{transform:none!important;opacity:1!important;padding:24px 16px;}.ptitle{font-size:clamp(14px,2.8vw,22px);letter-spacing:.04em;}.pkr{font-size:10px;}.pdesc,.ptag{display:none;}.pcta{padding:9px 18px;font-size:9px;}#photo-wrap{width:40vw;height:72vh;}.cor{width:10px;height:10px;}.enter-ring{width:80px;height:80px;}}
@media(max-width:480px){#s3{flex-direction:column;}.panel{flex:1!important;min-height:50vh;transition:flex 0s!important;}.panel:hover{flex:1!important;}#dl{left:0!important;top:50%!important;width:100%!important;height:1px!important;}#dl::before{width:30px;height:30px;}.pc{transform:none!important;opacity:1!important;padding:24px 16px;}.ptag,.pdesc,.cor{display:none;}.ptitle{font-size:clamp(18px,5.5vw,26px);letter-spacing:.05em;}.pkr{font-size:11px;}.pcta{padding:10px 22px;font-size:10px;}#photo-wrap{width:68vw;height:62vh;}#sig{display:none;}.enter-ring{width:80px;height:80px;}.enter-txt{font-size:9px;letter-spacing:.4em;}}
/* GOLDEN SPARK FULL-SCREEN INTRO */
.golden-spark-overlay{position:fixed;inset:0;z-index:99999;background:#040302;display:flex;align-items:center;justify-content:center;pointer-events:auto;animation:sparkFadeOut 0.8s ease 1.6s forwards;}
.golden-spark-overlay.done{display:none;}
.golden-spark-dot{width:6px;height:6px;border-radius:50%;background:radial-gradient(circle,#C9A84C,rgba(201,168,76,0.4));box-shadow:0 0 20px #C9A84C,0 0 60px rgba(201,168,76,0.4);animation:sparkBurst 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;opacity:0;}
@keyframes sparkBurst{0%{opacity:0;transform:scale(0.3);box-shadow:0 0 8px #C9A84C;}40%{opacity:1;transform:scale(1.5);box-shadow:0 0 60px #C9A84C,0 0 120px rgba(201,168,76,0.3);}100%{opacity:0.6;transform:scale(1);box-shadow:0 0 30px #C9A84C;}}
@keyframes sparkFadeOut{0%{opacity:1;}100%{opacity:0;pointer-events:none;}}
</style>

<script>
/* ═══════════════════════════════════════════════════
   ARIS KIM — INDEX PAGE SCRIPT (CLEAN BUILD)
═══════════════════════════════════════════════════ */

/* ─── AUDIO ENGINE ─── */
let AC = null;
let introScheduled = false;
let animStartTime = null;
let audioResumed = false;

function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  AC.onstatechange = function(){ if(AC.state==='running') scheduleIntroAudio(); };
}

function makeReverb(dur, decay){
  dur = dur||3; decay = decay||2;
  var len = AC.sampleRate*dur;
  var buf = AC.createBuffer(2,len,AC.sampleRate);
  for(var ch=0;ch<2;ch++){
    var d=buf.getChannelData(ch);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  var rv=AC.createConvolver(); rv.buffer=buf; return rv;
}

/* 밴드패스 노이즈 — 음정 없는 물리적 질감 */
function noiseBurst(freq, Q, vol, atk, dcy, delay){
  if(!AC) return;
  delay = delay||0;
  var t = AC.currentTime+delay;
  var dur = atk+dcy+0.05;
  var buf = AC.createBuffer(1, Math.ceil(AC.sampleRate*dur), AC.sampleRate);
  var d = buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src = AC.createBufferSource(); src.buffer=buf;
  var bp = AC.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=freq; bp.Q.value=Q;
  var g = AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol, t+atk);
  g.gain.exponentialRampToValueAtTime(0.001, t+atk+dcy);
  src.connect(bp); bp.connect(g); g.connect(AC.destination);
  src.start(t); src.stop(t+dur+0.01);
}

/* A. 대기압 상승 — 빔 전 공기가 압축되는 느낌 */
function playPressureBuild(delay, dur){
  if(!AC) return;
  delay=delay||0; dur=dur||2.8;
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src=AC.createBufferSource(); src.buffer=buf;
  var lp=AC.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(35,t);
  lp.frequency.linearRampToValueAtTime(90,t+dur);
  lp.Q.value=1.5;
  var g=AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.9,t+dur*0.5);
  g.gain.linearRampToValueAtTime(1.4,t+dur);
  g.gain.linearRampToValueAtTime(0,t+dur+0.4);
  var rv=makeReverb(3,2.2);
  var rvG=AC.createGain(); rvG.gain.value=0.35;
  rv.connect(rvG); rvG.connect(AC.destination);
  src.connect(lp); lp.connect(g);
  g.connect(AC.destination); g.connect(rv);
  src.start(t);
}

/* B. 빔 스윕 — 고주파→저주파 whoosh */
function playBeamSwoosh(delay){
  if(!AC) return;
  delay=delay||0;
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,AC.sampleRate*0.9,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src=AC.createBufferSource(); src.buffer=buf;
  var hp=AC.createBiquadFilter(); hp.type='highpass';
  hp.frequency.setValueAtTime(4000,t);
  hp.frequency.exponentialRampToValueAtTime(200,t+0.5);
  var g=AC.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.7,t+0.05);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.85);
  var rv=makeReverb(3.5,1.5);
  var rvG=AC.createGain(); rvG.gain.value=0.5;
  rv.connect(rvG); rvG.connect(AC.destination);
  src.connect(hp); hp.connect(g);
  g.connect(AC.destination); g.connect(rv);
  src.start(t);
}

/* C. 서명 현현 — 금박이 빛에 반응하는 질감 */
function playRevealShimmer(delay){
  if(!AC) return;
  delay=delay||0;
  noiseBurst(2800, 8, 0.6, 0.008, 1.8, delay);
  noiseBurst(1400, 5, 0.35, 0.015, 2.4, delay+0.05);
  noiseBurst(600, 3, 0.2, 0.02, 3.0, delay+0.12);
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*0.15),AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
  var src=AC.createBufferSource(); src.buffer=buf;
  var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=4;
  var rv=makeReverb(6,1.0);
  var rvG=AC.createGain(); rvG.gain.value=1.2;
  rv.connect(rvG); rvG.connect(AC.destination);
  var g=AC.createGain();
  g.gain.setValueAtTime(1.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(bp); bp.connect(g); g.connect(rv); src.start(t);
}

/* D. 지진 서브베이스 붐 — 28Hz 이하, 음정 불가 */
function playSeismicBoom(delay){
  if(!AC) return;
  delay=delay||0;
  var t=AC.currentTime+delay;
  var sub=AC.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(28,t);
  sub.frequency.exponentialRampToValueAtTime(12,t+2.5);
  var sg=AC.createGain();
  sg.gain.setValueAtTime(0,t); sg.gain.linearRampToValueAtTime(4.0,t+0.006);
  sg.gain.exponentialRampToValueAtTime(0.001,t+3.0);
  sub.connect(sg); sg.connect(AC.destination);
  sub.start(t); sub.stop(t+3.2);
  noiseBurst(40, 1.5, 2.5, 0.01, 2.0, delay);
  noiseBurst(75, 2, 1.2, 0.02, 1.5, delay+0.05);
}

/* E. 지진 럼블 */
function playSeismicRumble(delay, dur){
  if(!AC) return;
  delay=delay||0; dur=dur||3.0;
  var t=AC.currentTime+delay;
  var buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  var src=AC.createBufferSource(); src.buffer=buf;
  var lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=45; lp.Q.value=2;
  var g=AC.createGain();
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(2.2,t+0.3);
  g.gain.setValueAtTime(2.5,t+0.8); g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(lp); lp.connect(g); g.connect(AC.destination); src.start(t);
}

/* 인트로 오디오 스케줄러 */
function scheduleIntroAudio(){
  if(introScheduled || !AC || AC.state!=='running') return;
  introScheduled = true;
  var e = animStartTime ? (performance.now()-animStartTime)/1000 : 0;
  function s(target){ return Math.max(0, target-e); }
  if(e<0.3)  playPressureBuild(s(0.0), 2.8);
  if(e<0.8)  playBeamSwoosh(s(0.5));
  if(e<2.8)  playRevealShimmer(s(2.4));
  if(e<4.2)  playSeismicBoom(s(3.6));
  if(e<4.5)  playSeismicRumble(s(3.7), 3.0);
}

/* 첫 인터랙션 시 AudioContext resume */
function tryResumeAudio(){
  if(audioResumed || !AC) return;
  audioResumed = true;
  AC.resume();
  ['mousemove','touchstart','scroll','keydown','click'].forEach(function(ev){
    document.removeEventListener(ev, tryResumeAudio);
  });
}

/* 럭셔리 클릭 사운드 — 순수 노이즈 버스트, 음정 없음 */
function playClickSound(){
  if(!AC || AC.state!=='running') return;
  noiseBurst(4000, 12, 0.55, 0.001, 0.012, 0);
  noiseBurst(900, 6, 0.25, 0.002, 0.020, 0);
  var t=AC.currentTime;
  var sub=AC.createOscillator(); sub.type='sine'; sub.frequency.value=55;
  var sg=AC.createGain();
  sg.gain.setValueAtTime(0,t); sg.gain.linearRampToValueAtTime(0.45,t+0.002);
  sg.gain.exponentialRampToValueAtTime(0.001,t+0.010);
  sub.connect(sg); sg.connect(AC.destination);
  sub.start(t); sub.stop(t+0.012);
}

document.addEventListener('click', function(e){
  if(e.target.closest('a,button,.panel,.pcta')) playClickSound();
}, true);

/* ─── CANVAS SETUP ─── */
var C=document.getElementById('cvs'), X=C.getContext('2d');
var CC=document.getElementById('crack-cvs'), CX=CC.getContext('2d');
function resize(){ C.width=innerWidth; C.height=innerHeight; CC.width=innerWidth; CC.height=innerHeight; }
resize(); addEventListener('resize',resize);

/* ─── CRACK & DEBRIS ─── */
var cracks=[], debris=[];
function addCrack(x,y,ang,len,depth){
  if(depth<=0||len<10) return;
  var ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
  cracks.push({x1:x,y1:y,x2:ex,y2:ey,a:0,maxA:0.5+Math.random()*0.35});
  var br=depth>1?(Math.random()<0.65?2:1):1;
  for(var i=0;i<br;i++) addCrack(ex,ey,ang+(Math.random()-.5)*1.3,len*(0.45+Math.random()*0.35),depth-1);
}
function spawnDebris(cx,cy,n){
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    debris.push({x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*80,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
      sz:1.5+Math.random()*3.5, a:0.9, rot:Math.random()*Math.PI*2,
      rv:(Math.random()-.5)*0.3, life:1, decay:0.014+Math.random()*0.016});
  }
}
function buildCracks(){
  cracks.length=0; debris.length=0;
  var cx=CC.width*0.5, cy=CC.height*0.51;
  for(var i=0;i<9;i++){
    var ang=(i/9)*Math.PI*2+(Math.random()-.5)*0.4;
    addCrack(cx,cy,ang,CC.width*(0.20+Math.random()*0.28),4);
  }
  spawnDebris(cx,cy,80);
}
var crackOn=false;
function drawCracks(){
  if(!crackOn) return;
  CX.clearRect(0,0,CC.width,CC.height);
  cracks.forEach(function(cr){
    cr.a=Math.min(cr.a+0.055,cr.maxA);
    CX.beginPath(); CX.moveTo(cr.x1,cr.y1); CX.lineTo(cr.x2,cr.y2);
    CX.strokeStyle='rgba(255,210,100,'+cr.a+')';
    CX.lineWidth=0.7+cr.a*1.2;
    CX.shadowColor='rgba(255,190,60,'+(cr.a*0.7)+')'; CX.shadowBlur=5;
    CX.stroke(); CX.shadowBlur=0;
  });
  debris.forEach(function(d){
    if(d.life<=0) return;
    d.x+=d.vx; d.y+=d.vy; d.vy+=0.14; d.vx*=0.97; d.rot+=d.rv;
    d.life-=d.decay; d.a=Math.max(0,d.life*0.9);
    CX.save(); CX.translate(d.x,d.y); CX.rotate(d.rot);
    CX.fillStyle='rgba(210,170,70,'+d.a+')';
    CX.fillRect(-d.sz/2,-d.sz/2,d.sz,d.sz); CX.restore();
  });
  requestAnimationFrame(drawCracks);
}

/* ─── SCREEN SHAKE ─── */
function shake(dur,amp){
  var el=document.getElementById('s1');
  var t0=performance.now();
  (function loop(){
    var p=Math.max(0,1-(performance.now()-t0)/dur);
    if(p<=0){el.style.transform='translate(0,0)';return;}
    el.style.transform='translate('+(( Math.random()-.5)*amp*p*2)+'px,'+(( Math.random()-.5)*amp*p*2)+'px)';
    requestAnimationFrame(loop);
  })();
}

/* ─── FLASH ─── */
function doFlash(col,a,dur){
  var f=document.getElementById('flash');
  f.style.background=col; f.style.opacity=a; f.style.transition='none';
  setTimeout(function(){ f.style.transition='opacity '+dur+'ms ease'; f.style.opacity=0; },25);
}

/* ─── PHASE 1: 스포트라이트 + 지진 ─── */
function phase1(done){
  document.fonts.load('140px "Herr Von Muellerhoff"').then(function(){
    var txt='Aris Kim';
    var fs=Math.min(innerWidth*.13,152);
    X.font=fs+'px "Herr Von Muellerhoff"';
    var tw=X.measureText(txt).width;
    var tx=(C.width-tw)/2, ty=C.height*.50;

    /* 지진은 서명 등장 이후(3.5s)에 시작 */
    setTimeout(function(){
      buildCracks(); crackOn=true; drawCracks();
      shake(2000,13);
      setTimeout(function(){shake(600,6);},900);
      setTimeout(function(){shake(300,3);},1600);
      doFlash('#fff',0.75,55);
      setTimeout(function(){doFlash('#ffaa00',0.3,150);},400);
      setTimeout(function(){doFlash('#fff',0.18,120);},900);
    },3500);

    var t0=null, dur=3200;
    function frame(ts){
      if(!t0) t0=ts;
      var p=Math.min((ts-t0)/dur,1);
      var e=p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;

      X.fillStyle='#040302'; X.fillRect(0,0,C.width,C.height);

      /* 스포트라이트 빔 */
      if(e>0.04){
        var ba=Math.min(e*1.6,0.9);
        var cx=C.width*.5, sp=C.width*0.28*Math.min(e*1.4,1);
        X.save(); X.beginPath(); X.moveTo(cx,0);
        X.lineTo(cx-sp,C.height); X.lineTo(cx+sp,C.height); X.closePath();
        var bg=X.createLinearGradient(cx,0,cx,C.height);
        bg.addColorStop(0,'rgba(255,230,150,'+(ba*.26)+')');
        bg.addColorStop(.25,'rgba(232,204,122,'+(ba*.13)+')');
        bg.addColorStop(.55,'rgba(201,168,76,'+(ba*.07)+')');
        bg.addColorStop(1,'rgba(201,168,76,0)');
        X.fillStyle=bg; X.fill(); X.restore();
        var sg=X.createRadialGradient(cx,0,0,cx,0,85);
        sg.addColorStop(0,'rgba(255,240,170,'+(ba*.55)+')');
        sg.addColorStop(.4,'rgba(232,204,122,'+(ba*.2)+')');
        sg.addColorStop(1,'rgba(201,168,76,0)');
        X.beginPath(); X.arc(cx,0,85,0,Math.PI*2); X.fillStyle=sg; X.fill();
      }

      /* 서명 */
      if(e>0.35){
        var sa=Math.min((e-.35)/.45,1);
        X.save(); X.globalAlpha=sa;
        X.font=fs+'px "Herr Von Muellerhoff"';
        X.fillStyle='#EDE4D6';
        X.shadowColor='rgba(232,204,122,.65)'; X.shadowBlur=20*sa;
        X.fillText(txt,tx,ty); X.restore();
      }

      /* 한글 */
      if(e>0.65){
        var ka=Math.min((e-.65)/.28,1)*0.85;
        X.save(); X.globalAlpha=ka;
        X.font=(fs*.22)+'px "Cinzel"';
        X.fillStyle='#C9A84C'; X.textAlign='center';
        X.shadowColor='rgba(201,168,76,.55)'; X.shadowBlur=12*ka;
        X.fillText('아  리  스  김',C.width/2,ty+fs*.37);
        X.restore();
      }

      if(p<1){ requestAnimationFrame(frame); }
      else { setTimeout(function(){ crackOn=false; CX.clearRect(0,0,CC.width,CC.height); done(); },2500); }
    }
    requestAnimationFrame(frame);
  });
}

/* ─── PHASE 2 & 3 ─── */
function phase2(done){
  document.getElementById('s1').classList.add('out');
  setTimeout(function(){
    document.getElementById('s1').style.display='none';
    document.getElementById('s2').classList.add('show');
    setTimeout(done,1900);
  },1400);
}
function phase3(){
  var s2=document.getElementById('s2');
  s2.classList.add('out');
  setTimeout(function(){ s2.style.display='none'; document.getElementById('dl').classList.add('show'); },1000);
  setTimeout(function(){ document.getElementById('pa').classList.add('open'); document.getElementById('pb').classList.add('open'); },1200);
}

/* ─── GOLDEN SPARK REMOVAL ─── */
var sparkEl=document.getElementById('sparkOverlay');
if(sparkEl){setTimeout(function(){sparkEl.classList.add('done');},2500);}

/* ─── START ─── */
var skip=new URLSearchParams(location.search).get('skip');
if(skip==='1'){
  if(sparkEl) sparkEl.classList.add('done');
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='none';
  document.getElementById('dl').classList.add('show');
  document.getElementById('pa').classList.add('open');
  document.getElementById('pb').classList.add('open');
} else {
  initAudio();
  ['mousemove','touchstart','scroll','keydown','click'].forEach(function(ev){
    document.addEventListener(ev, tryResumeAudio, {passive:true});
  });
  document.fonts.ready.then(function(){
    setTimeout(function(){
      animStartTime = performance.now();
      phase1(function(){ phase2(function(){ phase3(); }); });
    },400);
  });
}

/* ─── 패널 분리선 hover ─── */
var dl=document.getElementById('dl'),pa=document.getElementById('pa'),pb=document.getElementById('pb');
dl.style.transition='left .75s cubic-bezier(.23,1,.32,1),opacity .9s ease';
pa.addEventListener('mouseenter',function(){ dl.style.left='58%'; });
pa.addEventListener('mouseleave',function(){ dl.style.left='50%'; });
pb.addEventListener('mouseenter',function(){ dl.style.left='42%'; });
pb.addEventListener('mouseleave',function(){ dl.style.left='50%'; });
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft') location.href='story.html';
  if(e.key==='ArrowRight') location.href='booking.html';
});
</script>
